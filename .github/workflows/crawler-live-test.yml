name: Crawler live test

# Runs the requested country crawlers against their LIVE AIP sources on the
# self-hosted runner and prints what they parse - WITHOUT publishing anything
# (no API key involved; the OutputHandler is never invoked). Used to validate
# a new or changed crawler before enabling its country on the website
# (`liveCountries` in src/lib/utils.ts).
#
# Trigger manually (Actions -> Crawler live test -> Run workflow), or it runs
# automatically on a PR that touches this file - which doubles as the way to
# kick off a validation run from a PR.

on:
  workflow_dispatch:
    inputs:
      countries:
        description: "Space-separated country codes to test-crawl (default: the 7 new ones)"
        required: false
        default: "BE CZ DK GR NO PL SE"
      pdf_recon:
        description: "Chart-PDF reconnaissance: fetch the first 3 airports' chart pages per country and list the PDF links found (Stage-2 groundwork)"
        required: false
        type: boolean
        default: false
      check_urls:
        description: "Space-separated external URLs to HTTP-check from the runner (e.g. EFB deep-link patterns; the sandboxed agent has no egress)"
        required: false
        default: ""
      gen12:
        description: "Space-separated country codes for AIP GEN 1.2 reconnaissance (customs/entry airfields - source data for src/lib/customs-overrides.ts)"
        required: false
        default: ""
      probe_eaip:
        description: "Space-separated URLs of candidate eAIP roots to structurally classify (eurocontrol markers, AD-2 links) - groundwork for new-country crawlers"
        required: false
        default: ""
      dump_url:
        description: "Space-separated URLs whose CONTENT to dump from the runner (status, title, text head, api/notam/gramet-ish links) - status-only checks let the autorouter soft-404 through"
        required: false
        default: ""
      pdf_dump:
        description: "Space-separated PDF URLs to download and dump the extracted text of (pypdf) - e.g. an AD 1.3 index for ICAO<->name mapping; source for _NAMES / customs recon"
        required: false
        default: ""
      ad23_dump:
        description: "Space-separated eAIP AD-2 page URLs to dump the AD 2.3 OPERATIONAL HOURS section of (raw table text + the parser's per-row split + parsed hours) - tuning the AD 2.3 operation-hours parser"
        required: false
        default: ""
      ad2_recon:
        description: "Space-separated eurocontrol country codes: crawl each, then dump the AD 2.12 (runways) / 2.13 (declared distances) / 2.20 (local traffic regs / circuit) raw section text of the first few fields - tuning the AD-2 facts parser (Phase E)"
        required: false
        default: ""
      indexnow_test:
        description: "Space-separated URLs to submit to IndexNow (api.indexnow.org) as an end-to-end test; prints the response + confirms the key file is served"
        required: false
        default: ""
      naviair_gen12:
        description: "DK-only: walk the Naviair Umbraco JSON tree to the GEN 1.2 / AD 1.x customs documents, download the PDFs and dump their text (customs/entry aerodromes - source for src/lib/customs-overrides.ts). Set to 1 to run."
        required: false
        default: ""
      de_ocr:
        description: "DE-only: OCR the DFS AD-2 page images (base64 PNGs) of these space-separated ICAOs and print the extracted text - validates the DE OCR quality WITHOUT publishing (Phase F2). E.g. 'EDNY EDDH'."
        required: false
        default: ""
  pull_request:
    paths:
      - ".github/workflows/crawler-live-test.yml"
      - "crawlers/crawlers/**"
  # Agent bridge: pushing this file to a claude/** branch runs the GEN 1.2
  # recon (GEN12_PUSH_DEFAULT below) and COMMITS the output back to the
  # branch as crawlers/recon/gen12-latest.txt - the sandboxed agent has no
  # egress to GitHub's API/log endpoints, but can read the repo over git.
  # The output commit only touches crawlers/recon/, so it cannot retrigger
  # this push trigger (paths filter = this file only).
  push:
    branches:
      - "claude/**"
    paths:
      - ".github/workflows/crawler-live-test.yml"

concurrency:
  group: crawler-live-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # write: the push-triggered GEN 1.2 recon commits its output file back to
  # the (non-main) branch it ran on. All other paths only read.
  contents: write

env:
  # Countries the push-triggered agent-bridge recon fetches (workflow_dispatch
  # passes its own `gen12` input instead). Empty = the push trigger runs
  # nothing heavy; set a country list here (and push) to use the bridge.
  GEN12_PUSH_DEFAULT: ""

jobs:
  live-test:
    name: Live crawl (no publish)
    runs-on: self-hosted
    timeout-minutes: 30
    defaults:
      run:
        working-directory: crawlers
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: crawlers/uv.lock

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      # Headless Chromium for the JS-rendering fallback (DK/Naviair). Cached
      # by setup-uv is not enough - the browser binary lives outside the uv
      # cache, so install it explicitly. Best-effort: a failure here must not
      # fail the whole job (DK then reports 0 via PlaywrightUnavailable and is
      # an allowed failure below).
      - name: Install Playwright Chromium
        continue-on-error: true
        run: uv run playwright install chromium --with-deps

      # Tesseract OCR for the DE AD-2 page images (DFS serves them as base64
      # PNGs) AND the global pdf_text OCR fallback for image-only eAIP PDFs.
      # Language packs cover the PDF-caller countries (ES/GR/RO/MK/RS/DK) plus
      # deu/eng. Best-effort: the OCR paths are fail-soft.
      - name: Install Tesseract OCR
        continue-on-error: true
        run: >-
          sudo apt-get update && sudo apt-get install -y
          tesseract-ocr tesseract-ocr-deu tesseract-ocr-spa tesseract-ocr-ell
          tesseract-ocr-ron tesseract-ocr-mkd tesseract-ocr-hrv tesseract-ocr-dan

      # Optional: verify external deep-link URL patterns (EFB hand-offs etc.)
      # from the runner - the sandboxed agent environment has no egress, so
      # this is the only place such links can be validated before shipping.
      - name: Check external URLs
        if: ${{ inputs.check_urls != '' }}
        continue-on-error: true
        run: |
          for u in ${{ inputs.check_urls }}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 -L -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" "$u" || echo "ERR")
            echo "URLCHECK $code $u"
          done

      # Optional: end-to-end IndexNow test - POST the given URLs to
      # api.indexnow.org with the public key and print the response (200/202 =
      # accepted), and confirm the key file is served. The sandboxed agent
      # cannot reach IndexNow/aip.aero, so this is the only place to verify the
      # live submit path (src/lib/indexnow.ts).
      - name: IndexNow test submit
        if: ${{ inputs.indexnow_test != '' }}
        continue-on-error: true
        env:
          URLS: ${{ inputs.indexnow_test }}
        run: |
          key="fae2b7dc9cfb44919eb6b358e7c4a846"
          keycode=$(curl -sS -o /tmp/key.out -w '%{http_code}' "https://aip.aero/$key.txt") || keycode=000
          echo "Key file https://aip.aero/$key.txt -> HTTP $keycode, content: $(cat /tmp/key.out 2>/dev/null)"
          urllist=$(printf '"%s",' $URLS | sed 's/,$//')
          body="{\"host\":\"aip.aero\",\"key\":\"$key\",\"keyLocation\":\"https://aip.aero/$key.txt\",\"urlList\":[$urllist]}"
          echo "POST body: $body"
          code=$(curl -sS -o /tmp/indexnow.out -w '%{http_code}' -X POST \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$body" https://api.indexnow.org/indexnow) || code=000
          echo "IndexNow api.indexnow.org -> HTTP $code (200/202 = accepted)"
          cat /tmp/indexnow.out 2>/dev/null || true

      # Optional (DK): the generic gen12 recon assumes a eurocontrol eAIP with
      # an HTML AD 1.3 table - Naviair publishes an Umbraco JSON tree of PDFs
      # instead, so it needs its own reader. Walk the tree to the GEN 1.2 (and
      # any AD 1.3-style index) documents, download each PDF, and extract its
      # text with pypdf (installed ad-hoc via `uv run --with`, kept out of the
      # crawler's production deps). Prints the customs/entry table so the
      # verified DK entries for src/lib/customs-overrides.ts can be filled.
      - name: Naviair GEN 1.2 recon (DK customs)
        if: ${{ inputs.naviair_gen12 != '' }}
        continue-on-error: true
        run: |
          uv run --directory crawlers --with pypdf python - <<'PY'
          import io
          import re
          from urllib.parse import urljoin

          import httpx
          from pypdf import PdfReader

          API = "https://aim.naviair.dk/umbraco/api/naviairapi/getnodesforparent"
          ROOT = "https://aim.naviair.dk/"
          UA = "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36"
          client = httpx.Client(
              follow_redirects=True, timeout=30, headers={"User-Agent": UA}
          )

          def nodes(parent_id=""):
              try:
                  r = client.get(f"{API}?parentId={parent_id}")
                  r.raise_for_status()
                  data = r.json()
                  return data if isinstance(data, list) else []
              except Exception as e:
                  print(f"   nodes({parent_id}) failed: {type(e).__name__}: {e}")
                  return []

          def label(n):
              return str(n.get("name") or n.get("title") or "").strip()

          def href(n):
              for k in ("href", "link"):
                  v = n.get(k)
                  if isinstance(v, str) and v.strip():
                      return v.strip()
              return None

          def child(nodes_, *needles):
              wanted = [x.lower() for x in needles]
              texts = [
                  f"{n.get('name','')} {n.get('title','')}".lower() for n in nodes_
              ]
              for n, t in zip(nodes_, texts):
                  if all(w in t for w in wanted):
                      return n
              for n, t in zip(nodes_, texts):
                  if any(w in t for w in wanted):
                      return n
              return None

          def dump_pdf(url, note=""):
              print(f"\n----- PDF {note}: {url}")
              try:
                  r = client.get(url)
                  r.raise_for_status()
                  reader = PdfReader(io.BytesIO(r.content))
                  text = "\n".join(p.extract_text() or "" for p in reader.pages)
                  text = re.sub(r"[ \t]+", " ", text)
                  print(f"   {len(reader.pages)} pages, {len(text)} chars")
                  print(text[:9000])
              except Exception as e:
                  print(f"   PDF dump failed: {type(e).__name__}: {e}")

          root = nodes("")
          print("ROOT nodes:", [f"{n.get('id')}:{label(n)}" for n in root])
          aip = child(root, "AIP", "Danmark") or child(root, "AIP")
          if not aip:
              print("No 'AIP Danmark' root node found - aborting.")
              raise SystemExit(0)
          print(f"AIP Danmark node: {aip.get('id')} {label(aip)}")

          # FULL recursive dump of a subtree (label/id/href, indented) so the
          # exact GEN 1.2 / AD 1.3 leaf documents are visible - the previous
          # run stopped one level too shallow and its filename filter missed
          # the underscored leaf names (EK_GEN_1_2_...). Also collects every
          # leaf document under the subtree for the customs PDF dump.
          leaves = []

          def dump_tree(node, depth=0, maxdepth=5):
              lbl = label(node)
              h = href(node)
              pad = "   " * depth
              print(f"{pad}- {node.get('id')} {lbl}  href={h}")
              if h is not None:
                  leaves.append((lbl, urljoin(ROOT, h)))
                  return
              if depth >= maxdepth:
                  return
              for c in nodes(node.get("id", "")):
                  dump_tree(c, depth + 1, maxdepth)

          aip_children = nodes(aip.get("id", ""))
          # The two subtrees that carry the customs source: GEN 1 (entry /
          # transit / departure of aircraft -> GEN 1.2) and AD 1 (the
          # AD 1.3-style aerodrome index designating INTL fields).
          part1 = child(aip_children, "PART 1") or child(aip_children, "GEN")
          part3 = child(aip_children, "PART 3") or child(aip_children, "AD")

          if part1:
              print(f"\n===== GEN subtree (id {part1.get('id')}) =====")
              gen1 = child(nodes(part1.get("id", "")), "GEN 1")
              dump_tree(gen1 or part1, 0)
          if part3:
              print(f"\n===== AD subtree (id {part3.get('id')}) =====")
              ad1 = child(nodes(part3.get("id", "")), "AD 1")
              dump_tree(ad1 or part3, 0)

          # From every collected leaf, dump the PDFs that look like the entry /
          # customs source (GEN 1.2, AD 1.3, or entry/transit/departure text).
          WANT = re.compile(
              r"1[._ ]?2|1[._ ]?3|entry|transit|departure|toldkontrol|customs"
              r"|indrejse|udrejse|told",
              re.I,
          )
          picked = [(l, u) for l, u in leaves if u.lower().endswith(".pdf") and (WANT.search(l) or WANT.search(u))]
          print(f"\n===== candidate customs PDFs ({len(picked)} of {len(leaves)} leaves) =====")
          for lbl, url in picked:
              print(f"  {lbl}\n    -> {url}")
          for lbl, url in picked[:8]:
              dump_pdf(url, note=lbl)
          PY

      # Optional: dump the CONTENT of arbitrary URLs from the runner - title,
      # text head and API-ish links. Complements the status-only check above:
      # a soft-404 (HTTP 200 + "page not found" body, see the autorouter
      # hand-off removal 13.07.2026) passes a status check but is obvious in
      # the dump. Also the reading path for API docs the sandboxed agent
      # cannot fetch (its proxy gets 403 from some hosts).
      - name: Dump URL content
        if: ${{ inputs.dump_url != '' }}
        continue-on-error: true
        env:
          DUMP: ${{ inputs.dump_url }}
        run: |
          uv run --directory crawlers python - <<'PY'
          import os, re
          import httpx
          from bs4 import BeautifulSoup

          UA = "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          for url in os.environ["DUMP"].split():
              print(f"\n===== DUMP {url} =====")
              try:
                  r = httpx.get(url, headers={"User-Agent": UA},
                                follow_redirects=True, timeout=20)
                  print(f"   status {r.status_code}  final {r.url}")
                  soup = BeautifulSoup(r.text, "html.parser")
                  title = soup.title.get_text(strip=True) if soup.title else "(no title)"
                  print(f"   title: {title}")
                  text = " ".join(soup.get_text(" ", strip=True).split())
                  print(f"   text head: {text[:2500]}")
                  api_re = re.compile(r"api|notam|gramet|token|oauth|metar|briefing|swagger|openapi|chart|kartta|kort|vac|adc|iac|2\.24|Charts|WePub|aip|eaip|AD-|AD_|index|start|html|login|prijava|subscribe", re.I)
                  seen = set()
                  for a in soup.find_all("a", href=True):
                      label = " ".join(a.get_text(" ", strip=True).split())[:60]
                      href = a["href"]
                      if api_re.search(href + " " + label) and href not in seen:
                          seen.add(href)
                          print(f"   link [{label}] {href[:140]}")
                      if len(seen) > 40:
                          break
                  # Chart section pages often EMBED the PDF rather than <a>
                  # link it - report object/embed/iframe/img sources too.
                  for tag in soup.find_all(["object", "embed", "iframe", "img"]):
                      src = tag.get("data") or tag.get("src") or ""
                      if src and (".pdf" in src.lower() or "chart" in src.lower()
                                  or "wepub" in src.lower()):
                          print(f"   embed <{tag.name}> {src[:140]}")
                  # VFR-manual index discovery: the per-field detail pages are
                  # "<icao>_text_en.html"; list them UNCAPPED (the api_re list
                  # above stops at 40 and a long aerodrome directory can hide
                  # behind the supplement links). Also list "*_map_en.pdf"
                  # (the per-field chart map).
                  field_re = re.compile(r"[a-z0-9]+_text_en\.html$", re.I)
                  fields = [a["href"].strip() for a in soup.find_all("a", href=True)
                            if field_re.search(a["href"].strip())]
                  fields = list(dict.fromkeys(fields))
                  print(f"   _text_en.html anchors: {len(fields)}")
                  if fields:
                      print("   " + " ".join(fields[:250]))
                  # JSON-LD duplication audit: count ld+json scripts and how
                  # many carry each @type / @id, so a doubled WebSite /
                  # SearchAction node (Workers render artifact) is visible.
                  ld = soup.find_all("script", attrs={"type": "application/ld+json"})
                  ids = re.findall(r'"@id"\s*:\s*"([^"]+)"', r.text)
                  types = re.findall(r'"@type"\s*:\s*"([^"]+)"', r.text)
                  import collections as _c
                  print(f"   ld+json scripts: {len(ld)}")
                  print(f"   @id counts: {dict(_c.Counter(ids))}")
                  print(f"   @type counts: {dict(_c.Counter(types))}")
                  print(f"   SearchAction occurrences: {r.text.count('SearchAction')}")
              except Exception as e:
                  print(f"   FAILED - {type(e).__name__}: {e}")
          PY

      # Optional: dump the AD 2.3 "OPERATIONAL HOURS" section of eAIP AD-2
      # pages, to TUNE the operation-hours parser (docs/operation-hours-
      # concept.md). AD 2.3 is a multi-row ICAO table (AD Administration,
      # Customs, AIS, ATS, Fuelling, ...) with no single "aerodrome open" row,
      # so a naive slice conflates a service row's H24 into the field's hours.
      # This prints the raw section + the row split so the aerodrome/ATS row
      # can be isolated per format before the crawler relies on it.
      - name: Dump AD 2.3 sections
        if: ${{ inputs.ad23_dump != '' }}
        continue-on-error: true
        env:
          URLS: ${{ inputs.ad23_dump }}
        run: |
          uv run python - <<'PY'
          import os, re
          import httpx
          from bs4 import BeautifulSoup
          from crawlers.http_eurocontrol_base import ad23_hours
          from crawlers.operating_hours import parse_ad23_text

          UA = "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          SEC = re.compile(
              r"AD\s*2\.3\s*OPERATIONAL HOURS\b(.*?)(?:\bAD\s*2\.(?:4|\d\d)\b)",
              re.I | re.S,
          )
          # Standard AD 2.3 row labels - printing where each first appears in the
          # section reveals the boundary between the aerodrome/administration row
          # and the downstream service rows (AIS/MET/ATS are often centrally H24).
          ROWS = ["Customs", "Health", "AIS", "ARO", "MET", "ATS",
                  "Fuelling", "Handling", "Security", "De-icing", "Remarks"]
          for url in os.environ["URLS"].split():
              print(f"\n===== AD 2.3 {url} =====")
              try:
                  r = httpx.get(url, headers={"User-Agent": UA},
                                follow_redirects=True, timeout=25)
                  print(f"   status {r.status_code}")
                  text = " ".join(BeautifulSoup(r.text, "html.parser").get_text(" ").split())
                  m = SEC.search(text)
                  if not m:
                      print("   no AD 2.3 section found")
                      continue
                  sec = m.group(1)
                  print(f"   raw section ({len(sec)} chars):")
                  print("   " + sec[:1600])
                  print("   row-label offsets: " + ", ".join(
                      f"{lbl}@{sec.find(lbl)}" for lbl in ROWS if sec.find(lbl) >= 0))
                  print(f"   parsed (current ad23_hours): {ad23_hours(text)}")
                  print(f"   parsed (full section): {parse_ad23_text(sec)}")
              except Exception as e:
                  print(f"   FAILED - {type(e).__name__}: {e}")
          PY

      # Optional: download PDF(s) and dump their extracted text. Generic
      # counterpart to dump_url for the many AIPs that publish data as PDF
      # (an AD 1.3 "Index of Aerodromes" gives the ICAO<->name mapping for a
      # crawler's _NAMES; a GEN 1.2 gives customs/entry airfields). pypdf is
      # installed ad-hoc via `uv run --with`, kept out of the crawler deps.
      - name: Dump PDF text
        if: ${{ inputs.pdf_dump != '' }}
        continue-on-error: true
        env:
          PDF_DUMP: ${{ inputs.pdf_dump }}
        run: |
          uv run --directory crawlers --with pypdf python - <<'PY'
          import io, os
          import httpx
          from pypdf import PdfReader

          UA = "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          for url in os.environ["PDF_DUMP"].split():
              print(f"\n===== PDF {url} =====", flush=True)
              try:
                  r = httpx.get(url, headers={"User-Agent": UA},
                                follow_redirects=True, timeout=40)
                  print(f"   status {r.status_code}  {len(r.content)} bytes")
                  r.raise_for_status()
                  reader = PdfReader(io.BytesIO(r.content))
                  text = "\n".join(p.extract_text() or "" for p in reader.pages)
                  # Collapse blank runs; print a generous head (index tables
                  # are near the top). 8000 chars covers an AD 1.3 table.
                  lines = [ln.rstrip() for ln in text.splitlines()]
                  compact = "\n".join(ln for ln in lines if ln.strip())
                  print(f"   {len(reader.pages)} pages, {len(text)} chars")
                  print("   --- text ---")
                  print(compact[:8000])
              except Exception as e:
                  print(f"   FAILED - {type(e).__name__}: {e}")
          PY

      # Optional: structurally classify candidate eAIP roots for NEW
      # countries: does the URL lead to a eurocontrol-style eAIP (frameset /
      # index-<lang>.html / eAIP folder with XX-AD-2.YYYY pages)? Prints the
      # page title, meta-refresh/frame targets and every link that smells
      # like an eAIP entry or AD-2 section, so a crawler can be written
      # without guessing.
      - name: Probe candidate eAIP roots
        if: ${{ inputs.probe_eaip != '' }}
        continue-on-error: true
        env:
          PROBE: ${{ inputs.probe_eaip }}
          # For the 403 proxy-retry (SK/LT: datacenter-IP blocks).
          BRIGHTDATA_PROXY_URL: ${{ secrets.BRIGHTDATA_PROXY_URL }}
          # Last-resort escalation: the Web Unlocker terminates TLS on the
          # proxy side (IE's legacy-cipher-only server) and solves
          # WAF/captcha gates the plain proxy cannot (SK/LT).
          BRIGHTDATA_UNLOCKER_URL: ${{ secrets.BRIGHTDATA_UNLOCKER_URL }}
        run: |
          uv run python - <<'PY'
          import os
          import re
          import ssl
          import subprocess
          from urllib.parse import urljoin, urlsplit

          import httpx
          from bs4 import BeautifulSoup

          from crawlers.http_base import BROWSER_HEADERS

          # Public intermediates for hosts that send a broken chain (SI
          # sends the wrong RapidSSL intermediate - probe-si.md). Fetched
          # over normally verified connections; verification never off.
          EXTRA_CA_URLS = [
              "https://cacerts.digicert.com/RapidSSLTLSRSACAG1.crt.pem",
          ]

          def make_client(kind: str | None) -> httpx.Client:
              """Default client, or a TLS-special variant that still
              verifies: "ca" = default bundle + pinned intermediates,
              "legacy" = TLSv1/SECLEVEL=0 handshake for ancient stacks."""
              verify: ssl.SSLContext | bool = True
              if kind == "ca":
                  ctx = ssl.create_default_context()
                  for u in EXTRA_CA_URLS:
                      r = httpx.get(u, timeout=30, follow_redirects=True)
                      r.raise_for_status()
                      ctx.load_verify_locations(cadata=r.text)
                  verify = ctx
              elif kind == "legacy":
                  ctx = ssl.create_default_context()
                  ctx.minimum_version = ssl.TLSVersion.TLSv1
                  ctx.set_ciphers("DEFAULT@SECLEVEL=0")
                  ctx.options |= getattr(ssl, "OP_LEGACY_SERVER_CONNECT", 0)
                  verify = ctx
              return httpx.Client(
                  follow_redirects=True,
                  timeout=30,
                  headers=BROWSER_HEADERS,
                  verify=verify,
              )

          client = make_client(None)
          META_REFRESH = re.compile(
              r"""http-equiv=["']?refresh["']?[^>]*url=([^"'>\s]+)""", re.I
          )
          INTERESTING = re.compile(
              r"eAIP|index-[a-z]{2}-[A-Z]{2}|AD[- ]2|menu|frameset|aip", re.I
          )

          def dump_links(soup: BeautifulSoup, base: str, pad: str) -> int:
              seen = set()
              hits = 0
              for a in soup.find_all("a", href=True):
                  href = urljoin(base, a["href"])
                  text = " ".join(a.get_text(" ", strip=True).split())[:60]
                  if href in seen or not INTERESTING.search(href + " " + text):
                      continue
                  seen.add(href)
                  hits += 1
                  if hits <= 25:
                      print(f"{pad}link [{text}] {href[:150]}")
              print(f"{pad}({hits} interesting links total)")
              return hits

          def tls_diagnose(url: str, pad: str) -> None:
              """On a connect/TLS failure, dump the server's certificate
              chain (subjects/issuers/verify errors) via openssl so a
              missing intermediate or a legacy handshake is identifiable
              from the run log (SI: CERTIFICATE_VERIFY_FAILED; IE:
              handshake failure on a legacy stack)."""
              host = urlsplit(url).netloc.split("@")[-1].split(":")[0]
              for label, extra in (
                  ("default", []),
                  ("legacy", ["-legacy_server_connect"]),
                  ("seclevel1", ["-cipher", "DEFAULT@SECLEVEL=1"]),
              ):
                  cmd = [
                      "openssl", "s_client", "-connect", f"{host}:443",
                      "-servername", host, "-showcerts", *extra,
                  ]
                  try:
                      out = subprocess.run(
                          cmd, input=b"", capture_output=True, timeout=25
                      )
                  except Exception as e:
                      print(f"{pad}[tls {label}] {type(e).__name__}: {e}")
                      continue
                  text = out.stdout.decode(errors="replace")
                  err = out.stderr.decode(errors="replace")
                  lines = [
                      ln.strip()
                      for ln in (text + "\n" + err).splitlines()
                      if re.search(
                          r"^\s*\d+ s:|^\s*i:|verify error|verify return"
                          r"|alert |Cipher is|Verification", ln
                      )
                  ]
                  print(f"{pad}[tls {label}] exit {out.returncode}")
                  for ln in lines[:14]:
                      print(f"{pad}  {ln[:160]}")

          def render_probe(url: str, pad: str) -> bool:
              """JS-app fallback: render the page with headless Chromium
              (the runner has Playwright installed for DK) and dump the
              links from the rendered DOM - a 0-link static probe on a
              JS shell (BG/b-flip) is useless without this."""
              try:
                  from playwright.sync_api import sync_playwright

                  with sync_playwright() as p:
                      browser = p.chromium.launch()
                      page = browser.new_page()
                      page.goto(url, wait_until="networkidle", timeout=45000)
                      html = page.content()
                      browser.close()
              except Exception as e:
                  print(f"{pad}[render] failed: {type(e).__name__}: {e}")
                  return False
              soup = BeautifulSoup(html, "html.parser")
              title = soup.title.get_text(strip=True) if soup.title else "-"
              print(f"{pad}[render] title: {title[:120]}")
              dump_links(soup, url, pad + "  ")
              return True

          def unlocker_dump(url: str, pad: str) -> None:
              """Last resort: one fetch through the Bright Data Web
              Unlocker zone (TLS terminated proxy-side, WAF/captcha
              solving) and a link dump. verify=False is inherent to
              unlocker-style proxies (they re-encrypt with their own CA);
              this is recon of public AIP HTML, never a content pipeline.
              """
              unlocker = os.environ.get("BRIGHTDATA_UNLOCKER_URL", "").strip()
              if not unlocker:
                  print(f"{pad}[unlocker] no zone configured - skipping")
                  return
              if "://" not in unlocker:
                  unlocker = f"http://{unlocker}"
              print(f"{pad}[unlocker] via {unlocker.split('@')[-1]}")
              try:
                  c = httpx.Client(
                      follow_redirects=True,
                      timeout=60,
                      headers=BROWSER_HEADERS,
                      proxy=unlocker,
                      verify=False,
                  )
                  r = c.get(url)
                  print(f"{pad}[unlocker] {r.status_code} {str(r.url)[:140]}")
                  r.raise_for_status()
              except Exception as e:
                  print(f"{pad}[unlocker] FAILED - {type(e).__name__}: {e}")
                  return
              soup = BeautifulSoup(r.text, "html.parser")
              title = soup.title.get_text(strip=True) if soup.title else "-"
              print(f"{pad}[unlocker] title: {title[:120]}")
              dump_links(soup, str(r.url), pad + "  ")

          def probe(url: str, depth: int = 0, retried: bool = False) -> None:
              global client
              pad = "   " + "  " * depth
              try:
                  r = client.get(url)
                  print(f"{pad}{r.status_code} {str(r.url)[:150]}")
                  r.raise_for_status()
              except httpx.ConnectError as e:
                  print(f"{pad}FAILED - ConnectError: {e}")
                  if depth == 0 and not retried:
                      tls_diagnose(url, pad)
                      # Retry once with the matching TLS-special client
                      # (still verifying): broken chain -> pinned extra
                      # CAs; pre-certificate handshake alert -> legacy.
                      kind = (
                          "ca"
                          if "CERTIFICATE_VERIFY_FAILED" in str(e)
                          else "legacy"
                      )
                      print(f"{pad}[tls-retry] rebuilding client: {kind}")
                      try:
                          client = make_client(kind)
                      except Exception as ce:
                          print(
                              f"{pad}[tls-retry] client build failed: "
                              f"{type(ce).__name__}: {ce}"
                          )
                          return
                      probe(url, depth, retried=True)
                  elif depth == 0 and retried:
                      # OpenSSL is out of options (IE answers every
                      # ClientHello with alert 40): Chromium brings its
                      # own TLS stack/fingerprint; if that is rejected
                      # too, the Web Unlocker (proxy-side TLS) is the
                      # final escalation.
                      print(f"{pad}[tls-retry] exhausted - trying Chromium")
                      if not render_probe(url, pad):
                          unlocker_dump(url, pad)
                  return
              except httpx.HTTPStatusError as e:
                  print(f"{pad}FAILED - HTTP {e.response.status_code}")
                  proxy = os.environ.get("BRIGHTDATA_PROXY_URL", "").strip()
                  if e.response.status_code == 403 and depth == 0 and retried:
                      # Direct AND plain-proxy both 403 (SK/LT: the block
                      # is not IP-based) - escalate to the Web Unlocker.
                      unlocker_dump(url, pad)
                      return
                  if (
                      e.response.status_code == 403
                      and depth == 0
                      and not retried
                      and proxy
                  ):
                      # Datacenter-IP block (SK/LT 403 despite browser
                      # headers): retry via the Bright Data proxy zone -
                      # same policy as the crawlers' use_proxy().
                      if "://" not in proxy:
                          proxy = f"http://{proxy}"
                      print(f"{pad}[proxy-retry] via {proxy.split('@')[-1]}")
                      try:
                          client = httpx.Client(
                              follow_redirects=True,
                              timeout=30,
                              headers=BROWSER_HEADERS,
                              proxy=proxy,
                              verify=False,
                          )
                      except Exception as pe:
                          print(f"{pad}[proxy-retry] failed: {pe}")
                          return
                      probe(url, depth, retried=True)
                  return
              except Exception as e:
                  print(f"{pad}FAILED - {type(e).__name__}: {e}")
                  return
              html = r.text
              soup = BeautifulSoup(html, "html.parser")
              title = soup.title.get_text(strip=True) if soup.title else "-"
              print(f"{pad}title: {title[:120]}")
              m = META_REFRESH.search(html)
              if m and depth < 2:
                  target = urljoin(str(r.url), m.group(1).strip())
                  print(f"{pad}meta-refresh -> {target[:150]}")
                  probe(target, depth + 1)
                  return
              frames = [
                  urljoin(str(r.url), f.get("src"))
                  for f in soup.find_all(["frame", "iframe"])
                  if f.get("src")
              ]
              for f in frames[:4]:
                  print(f"{pad}frame: {f[:150]}")
              hits = dump_links(soup, str(r.url), pad)
              # One level deeper on the most promising frame (eurocontrol
              # framesets hide the nav behind index -> frameset -> menu).
              if depth < 2 and frames and hits == 0:
                  probe(frames[0], depth + 1)
                  return
              # No links and no frames on the entry page: likely a
              # client-rendered JS app - retry with a real browser.
              if depth == 0 and hits == 0 and not frames:
                  render_probe(str(r.url), pad)

          for url in os.environ["PROBE"].split():
              print(f"\n===== PROBE {url[:120]} =====", flush=True)
              client = make_client(None)  # reset any tls-retry swap
              probe(url)
          PY

      # Optional: AIP GEN 1.2 reconnaissance - fetch each country's "Entry,
      # transit and departure of aircraft" section and print every table row /
      # text line naming an ICAO code or customs keyword. The output is the
      # VERIFICATION SOURCE for src/lib/customs-overrides.ts (never add
      # entries there that this section does not support).
      - name: GEN 1.2 recon (customs airfields)
        if: ${{ inputs.gen12 != '' || (github.event_name == 'push' && env.GEN12_PUSH_DEFAULT != '') }}
        continue-on-error: true
        env:
          GEN12: ${{ inputs.gen12 || env.GEN12_PUSH_DEFAULT }}
          # WAF'd sources (LT ans.lt, GR aisgr) 403 a datacenter IP: the crawl
          # AND the GEN 1.2 / AD 1.3 section fetch both route through the Web
          # Unlocker zone when the plain fetch is blocked.
          BRIGHTDATA_UNLOCKER_URL: ${{ secrets.BRIGHTDATA_UNLOCKER_URL }}
        run: |
          uv run python - <<'PY' 2>&1 | tee "$GITHUB_WORKSPACE/gen12-output.txt"
          import os
          import re
          import ssl
          import sys
          from urllib.parse import urljoin

          import httpx
          from bs4 import BeautifulSoup

          # Browser-like fingerprint (same set the crawlers use against
          # WAF'd sources - skeyes 403s a bare UA-only client).
          from crawlers.http_base import BROWSER_HEADERS

          # Default bundle + pinned public intermediates for hosts with a
          # broken chain (SI - see use_extra_ca in http_base.py). Fail-soft
          # so a cert-repo hiccup never kills recon for other countries.
          def _trusting_ctx() -> ssl.SSLContext:
              ctx = ssl.create_default_context()
              for u in [
                  "https://cacerts.digicert.com/RapidSSLTLSRSACAG1.crt.pem",
              ]:
                  try:
                      r = httpx.get(u, timeout=30, follow_redirects=True)
                      r.raise_for_status()
                      ctx.load_verify_locations(cadata=r.text)
                  except Exception as e:
                      print(f"   [extra-ca] {u} failed: {e}")
              return ctx

          client = httpx.Client(
              follow_redirects=True,
              timeout=30,
              headers=BROWSER_HEADERS,
              verify=_trusting_ctx(),
          )

          # Lazy Web Unlocker client (WAF'd sources: LT/GR). verify=False is
          # inherent to unlocker-style proxies (they re-encrypt with their own
          # CA); this is recon of public AIP HTML, never a content pipeline.
          _unlocker_url = os.environ.get("BRIGHTDATA_UNLOCKER_URL", "").strip()
          _unlocker: httpx.Client | None = None

          def _get(url: str) -> httpx.Response:
              """GET via the plain client; on a 403/connect block retry once
              through the Web Unlocker zone (if configured)."""
              global _unlocker
              try:
                  r = client.get(url)
                  r.raise_for_status()
                  return r
              except (httpx.HTTPStatusError, httpx.ConnectError) as e:
                  status = getattr(getattr(e, "response", None), "status_code", None)
                  if not _unlocker_url or status not in (403, None):
                      raise
                  if _unlocker is None:
                      proxy = _unlocker_url
                      if "://" not in proxy:
                          proxy = f"http://{proxy}"
                      print(f"   [unlocker] via {proxy.split('@')[-1]}")
                      _unlocker = httpx.Client(
                          follow_redirects=True, timeout=60,
                          headers=BROWSER_HEADERS, proxy=proxy, verify=False,
                      )
                  r = _unlocker.get(url)
                  r.raise_for_status()
                  return r

          META_REFRESH = re.compile(
              r"""http-equiv=["']?refresh["']?[^>]*url=([^"'>\s]+)""", re.I
          )

          def fetch(url: str) -> tuple[str, str]:
              """GET url, following one meta-refresh; returns (html, final_url).
              Routes through the Web Unlocker when the plain fetch is blocked."""
              r = _get(url)
              html = r.text
              m = META_REFRESH.search(html)
              if m:
                  url = urljoin(str(r.url), m.group(1).strip())
                  r = _get(url)
                  html = r.text
              return html, str(r.url)

          KW = re.compile(r"customs|zoll|douane|entry|einreise|grenz", re.I)

          def dump_customs_content(html: str, icao_prefix: str) -> int:
              """Print tables/lines that look customs- or ICAO-relevant.

              Every table's header row is printed (so list-style tables that
              name aerodromes without keywords are still discoverable); full
              rows only for matching tables. Returns the number of relevant
              hits so callers can debug an empty page."""
              soup = BeautifulSoup(html, "html.parser")
              icao_re = re.compile(rf"\b{icao_prefix}[A-Z]{{2}}\b")
              hits = 0
              for i, table in enumerate(soup.find_all("table"), 1):
                  rows = table.find_all("tr")
                  first = " | ".join(
                      " ".join(c.get_text(" ", strip=True).split())
                      for c in (rows[0].find_all(["td", "th"]) if rows else [])
                  )
                  print(f"   hdr table {i} ({len(rows)} rows): {first[:220]}")
                  ttext = table.get_text(" ", strip=True)
                  if not (icao_re.search(ttext) or KW.search(ttext)):
                      continue
                  hits += 1
                  for tr in rows:
                      cells = [
                          " ".join(td.get_text(" ", strip=True).split())
                          for td in tr.find_all(["td", "th"])
                      ]
                      row = " | ".join(c for c in cells if c)
                      if row:
                          print(f"     {row[:400]}")
              # Fallback/context: plain text lines with an ICAO code.
              for line in soup.get_text("\n").splitlines():
                  line = " ".join(line.split())
                  if line and icao_re.search(line):
                      hits += 1
                      print(f"   TXT {line[:300]}")
              if hits == 0:
                  flat = " ".join(html.split())
                  print(f"   [debug] no hits; html head: {flat[:700]}")
              return hits

          def recon_generic(code: str) -> None:
              """GEN 1.2 + AD 1.3 for any eurocontrol-eAIP country, zero
              per-country code: run the country's crawler, take any detail
              URL (it embeds the current AIRAC edition path) and construct
              the sibling section files in the same eAIP folder. The
              language suffix is read from the source filename (fr-FR,
              en-GB, ...). AD 1.3 (aerodrome index) is fetched too - several
              AIPs carry the customs/international designation there rather
              than as a GEN 1.2 table. Works for NEW countries automatically
              as soon as their crawler works."""
              from main import COUNTRY_CRAWLERS

              crawler = COUNTRY_CRAWLERS[code]()
              airports = crawler.crawl()
              src = next(
                  (a.url for a in airports if "/eAIP/" in a.url), None
              )
              if not src:
                  for a in airports[:3]:
                      print(f"   sample url: {a.url[:120]}")
                  print("   no /eAIP/ style URL - needs a country-specific recon")
                  return
              src = src.split("#")[0]
              folder, filename = src.rsplit("/", 1)
              # ICAO prefix for the content dump; FILE prefix for the URL -
              # FR names its files "FR-GEN-1.2-..." (country code), not "LF-".
              prefix = (airports[0].icao or "??")[:2]
              fm = re.match(r"([A-Z]{2})-", filename)
              file_prefix = fm.group(1) if fm else prefix
              m = re.search(r"-([a-z]{2}-[A-Z]{2})\.html?$", filename)
              langs = [m.group(1)] if m else []
              if "en-GB" not in langs:
                  langs.append("en-GB")
              # Each section has a hyphen and a space spelling (LVNL uses
              # spaces in filenames); first candidate that fetches wins.
              for variants in (("GEN-1.2", "GEN 1.2"), ("AD-1.3", "AD 1.3")):
                  fetched = False
                  for section in variants:
                      for lang in langs:
                          url = f"{folder}/{file_prefix}-{section}-{lang}.html"
                          try:
                              html, final = fetch(url)
                          except Exception as e:
                              print(f"   {section} ({lang}) failed: {type(e).__name__}: {e}")
                              continue
                          fetched = True
                          print(f"   --- {section} page: {final[:160]}")
                          dump_customs_content(html, prefix)
                          break
                      if fetched:
                          break
                  if not fetched:
                      print(f"   {variants[0]}: no candidate URL worked")

          def recon_uk(code: str = "UK") -> None:
              from crawlers.uk import ROOT_URL, UK

              c = UK()
              landing = c.fetch(ROOT_URL)
              edition = c._resolve_current_edition_url(ROOT_URL, landing)
              nav_url, nav_html = c.follow_frame_chain(
                  edition, ["eAISNavigationBase", "eAISNavigation"]
              )
              soup = c.soup(nav_html)
              hrefs = {
                  a["href"].split("#")[0]
                  for a in soup.find_all("a", href=True)
                  if "GEN-1.2" in a["href"]
              }
              if not hrefs:
                  print("   no GEN-1.2 link in nav; GEN links present:")
                  for a in soup.find_all("a", href=True):
                      if "GEN-1" in a["href"]:
                          print(f"     {a['href'][:160]}")
                  return
              url = urljoin(nav_url, sorted(hrefs)[0])
              print(f"   GEN 1.2 page: {url}")
              html, _ = fetch(url)
              dump_customs_content(html, "EG")

          def recon_de(code: str = "DE") -> None:
              from crawlers.de import IFR_BASE

              # Walk the BasicIFR folder tree: root -> GEN -> GEN 1 -> GEN 1.2.
              html, url = fetch(IFR_BASE)
              for pattern in (r"^GEN\b", r"^GEN 1\b", r"^GEN 1\.2\b"):
                  soup = BeautifulSoup(html, "html.parser")
                  links = [
                      (
                          " ".join(a.get_text(" ", strip=True).split()),
                          urljoin(url, a["href"]),
                      )
                      for a in soup.find_all("a", href=True)
                      if a.get_text(strip=True)
                  ]
                  match = next(
                      (l for l in links if re.search(pattern, l[0], re.I)), None
                  )
                  if not match:
                      print(f"   no link matching {pattern!r} at {url}; links:")
                      for text, href in links[:40]:
                          print(f"     [{text[:60]}] {href[:120]}")
                      return
                  print(f"   {pattern!r} -> [{match[0][:80]}] {match[1][:140]}")
                  html, url = fetch(match[1])
              # GEN 1.2 level: the content lives in numbered sub-pages
              # (GEN 1.2-1 ... GEN 1.2-N) - fetch and dump each of them.
              soup = BeautifulSoup(html, "html.parser")
              subs: list[tuple[str, str]] = []
              seen: set[str] = set()
              for a in soup.find_all("a", href=True):
                  text = " ".join(a.get_text(" ", strip=True).split())
                  if not re.match(r"GEN 1\.2-\d+", text):
                      continue
                  sub_url = urljoin(url, a["href"])
                  if sub_url in seen:
                      continue
                  seen.add(sub_url)
                  subs.append((text, sub_url))
              print(f"   {len(subs)} GEN 1.2 sub-pages")
              for i, (text, sub_url) in enumerate(subs):
                  print(f"   --- sub [{text[:40]}] {sub_url[:140]}")
                  sub_html, sub_final = fetch(sub_url)
                  dump_customs_content(sub_html, "ED")
                  # First sub-page: show the raw structure once, so an
                  # empty dump is diagnosable (DFS may render content as
                  # page images, which have no extractable text).
                  if i == 0:
                      print(f"   [debug] final url: {sub_final[:140]}")
                      flat = " ".join(sub_html.split())
                      print(f"   [debug] html head: {flat[:1200]}")

          # UK/DE have bespoke walks; every other (and future) country falls
          # through to the generic eurocontrol recon - no code needed when
          # adding a country whose source is a eurocontrol eAIP.
          def recon_es(code: str = "ES") -> None:
              """ENAIRE is not a eurocontrol eAIP (no /eAIP/ URLs): find
              the GEN 1.2 / AD 1.3 sections via the static AIP index the
              ES crawler enters through, and dump their customs content."""
              from crawlers.es import ROOT_URL as ES_ROOT

              html, base = fetch(ES_ROOT)
              soup = BeautifulSoup(html, "html.parser")
              pat = re.compile(
                  r"GEN[_\- ]?1[._\- ]?2|AD[_\- ]?1[._\- ]?3", re.I
              )
              seen: set[str] = set()
              hits = 0
              for a in soup.find_all("a", href=True):
                  text = " ".join(a.get_text(" ", strip=True).split())
                  href = a["href"]
                  if not (pat.search(href) or pat.search(text)):
                      continue
                  url = urljoin(base, href)
                  if url in seen:
                      continue
                  seen.add(url)
                  print(f"   --- section [{text[:60]}] {url[:160]}")
                  try:
                      sub_html, _sub = fetch(url)
                  except Exception as e:
                      print(f"   fetch failed: {type(e).__name__}: {e}")
                      continue
                  dump_customs_content(sub_html, "LE")
                  hits += 1
              if hits == 0:
                  print("   no GEN 1.2 / AD 1.3 links on the ENAIRE index:")
                  for a in soup.find_all("a", href=True)[:40]:
                      print(f"     {a['href'][:140]}")

          RECONS = {"UK": recon_uk, "DE": recon_de, "ES": recon_es}

          failed = []
          for code in os.environ["GEN12"].split():
              code = code.upper()
              print(f"\n===== GEN 1.2 {code} =====", flush=True)
              fn = RECONS.get(code, recon_generic)
              try:
                  fn(code)
              except Exception as e:
                  failed.append(code)
                  print(f"   FAILED - {type(e).__name__}: {e}")
          sys.exit(1 if failed else 0)
          PY

      # Agent bridge (see the push trigger comment): commit the recon output
      # into the branch so the sandboxed agent can read it over git. Never on
      # main; fail-soft (a concurrent agent push just wins the race).
      - name: Persist GEN 1.2 output to branch
        if: ${{ github.event_name == 'push' && github.ref_name != 'main' }}
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p crawlers/recon
          cp gen12-output.txt crawlers/recon/gen12-latest.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crawlers/recon/gen12-latest.txt
          if git diff --cached --quiet; then echo "no change"; exit 0; fi
          git commit -m "chore(recon): GEN 1.2 output (${GEN12_PUSH_DEFAULT}) [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Crawl live sources (no publish)
        env:
          # Push-triggered (agent-bridge) runs are about the GEN 1.2 output,
          # so crawl only the fastest country; dispatch/PR keep the full set.
          COUNTRIES: ${{ inputs.countries || (github.event_name == 'push' && 'CZ' || 'BE CZ DK GR NO PL SE') }}
          PDF_RECON: ${{ inputs.pdf_recon && '1' || '' }}
          # Known-blocked countries: still crawled and reported, but their
          # failure does not fail the job. DK = JS-rendered site (Playwright
          # renders it; kept here until a live run confirms the parse), GR =
          # server-side captcha gate (needs the BRIGHTDATA_UNLOCKER_URL
          # secret). Remove a code here once its crawler is verified.
          ALLOWED_FAILURES: "DK GR"
          # Bright Data zones for blocked sources (optional repo secrets).
          # UNLOCKER solves captchas + JS (GR); PROXY is the plain proxy that
          # only clears IP blocks. Format: http://user:pass@host:port.
          BRIGHTDATA_UNLOCKER_URL: ${{ secrets.BRIGHTDATA_UNLOCKER_URL }}
          BRIGHTDATA_PROXY_URL: ${{ secrets.BRIGHTDATA_PROXY_URL }}
        run: |
          uv run python - <<'PY'
          import logging
          import os
          import sys
          import traceback

          logging.basicConfig(
              level=logging.INFO, format="%(levelname)s %(name)s: %(message)s"
          )

          from main import COUNTRY_CRAWLERS
          from crawlers.http_eurocontrol_base import HttpEurocontrolBase

          codes = os.environ["COUNTRIES"].split()
          unknown = [c for c in codes if c.upper() not in COUNTRY_CRAWLERS]
          if unknown:
              sys.exit(f"Unknown country code(s): {unknown}")

          results: dict[str, int | None] = {}
          for code in codes:
              code = code.upper()
              print(f"\n===== {code} =====", flush=True)
              try:
                  crawler = COUNTRY_CRAWLERS[code]()
                  airports = crawler.crawl()
                  # Mirror main.py: collect AD 2.3 hours for eurocontrol crawlers
                  # so the coverage printout below reflects the real publish path.
                  if isinstance(crawler, HttpEurocontrolBase):
                      try:
                          crawler.collect_ad23_hours(airports)
                      except Exception as _he:
                          print(f"   AD 2.3 collection failed: {_he}")
                  results[code] = len(airports)
                  for a in airports[:5]:
                      print(f"   {a.icao} | {a.title} -> {a.url[:100]}")
                  if len(airports) > 5:
                      print(f"   ... and {len(airports) - 5} more")
                  # Stage-2 plumbing check: how many airports carry a direct
                  # chart-PDF URL (pdf_url), with samples.
                  with_pdf = [a for a in airports if getattr(a, "pdf_url", None)]
                  print(f"   pdf_url coverage: {len(with_pdf)}/{len(airports)}")
                  with_charts = [a for a in airports if getattr(a, "charts", None)]
                  n_charts = sum(len(a.charts or []) for a in with_charts)
                  print(f"   charts lists: {len(with_charts)}/{len(airports)} ({n_charts} charts total)")
                  for a in with_pdf[:3]:
                      print(f"     {a.icao or a.title} pdf -> {a.pdf_url[:110]}")
                  # eAIP AD 2.3 operation hours (docs/operation-hours-concept.md):
                  # crawlers that read the per-aerodrome AD 2 page collect the
                  # AUTHORITATIVE hours into `hours_by_icao` during crawl(). Print
                  # the coverage + a few samples so the AD 2.3 parse can be
                  # validated against the live source before it is relied upon.
                  hours = getattr(crawler, "hours_by_icao", {}) or {}
                  print(f"   AD 2.3 hours: {len(hours)}/{len(airports)}")
                  for _icao, _h in list(hours.items())[:5]:
                      print(f"     {_icao} hours -> {_h}")
                  # Reconnaissance mode: fetch the first chart pages and list
                  # the PDF links they expose, so per-country extraction can
                  # be written against real markup (the AIP hosts are not
                  # reachable from the sandboxed agent environment).
                  if os.environ.get("PDF_RECON"):
                      import re as _re
                      import ssl as _ssl
                      import httpx as _httpx
                      from urllib.parse import urljoin as _urljoin
                      # Fresh client: crawl() closes the crawler's own client.
                      # Trust the pinned intermediates for broken-chain hosts
                      # (SI) - fail-soft, like the GEN 1.2 recon client.
                      _ctx = _ssl.create_default_context()
                      for _u in [
                          "https://cacerts.digicert.com/RapidSSLTLSRSACAG1.crt.pem",
                      ]:
                          try:
                              _r = _httpx.get(_u, timeout=30, follow_redirects=True)
                              _r.raise_for_status()
                              _ctx.load_verify_locations(cadata=_r.text)
                          except Exception as _e:
                              print(f"   [extra-ca] {_u} failed: {_e}")
                      recon_client = _httpx.Client(
                          follow_redirects=True,
                          timeout=30,
                          headers={"User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36"},
                          verify=_ctx,
                      )
                      def _fetch_text(u):
                          r = recon_client.get(u)
                          r.raise_for_status()
                          return r.text
                      for a in airports[:3]:
                          print(f"   --- recon {a.icao or a.title}: {a.url[:110]}")
                          try:
                              html = _fetch_text(a.url)
                              # DE permalinks are tiny meta-refresh redirects
                              # to the edition-specific page - follow once.
                              m = _re.search(
                                  r'http-equiv=["\']?refresh[^>]*url=([^"\'> ]+)',
                                  html,
                                  _re.I,
                              )
                              if m:
                                  target = _urljoin(a.url, m.group(1).strip())
                                  print(f"       meta-refresh -> {target[:120]}")
                                  html = _fetch_text(target)
                              soup = crawler.soup(html)
                              pdfs = []
                              for link in soup.find_all("a", href=True):
                                  href = link["href"]
                                  if ".pdf" in href.lower():
                                      text = " ".join(link.get_text(" ", strip=True).split())[:80]
                                      pdfs.append((text, _urljoin(a.url, href)))
                              if not pdfs:
                                  # Some sources embed rather than link.
                                  for tag in soup.find_all(["object", "embed", "iframe", "img"]):
                                      src = tag.get("data") or tag.get("src") or ""
                                      if src and (".pdf" in src.lower() or "print" in src.lower()):
                                          pdfs.append((f"<{tag.name}>", _urljoin(a.url, src)))
                              print(f"       {len(pdfs)} pdf link(s)")
                              for text, href in pdfs[:12]:
                                  print(f"       [{text}] {href[:130]}")
                              if len(pdfs) <= 2:
                                  # Deep-recon aid (FI/IS): the mainline
                                  # charts are not anchor-linked on the
                                  # AD 2 page - list the links that SMELL
                                  # like a chart index / chart section so
                                  # the next navigation hop is visible.
                                  # Gate <= 2, not 0: FI pages anchor two
                                  # DATA pdfs (WPT_LIST/FAS_DB) and still
                                  # hide the charts (run 29274747730).
                                  chart_re = _re.compile(
                                      r"chart|kartta|kort|VAC|ADC|2\.24"
                                      r"|WePub|Charts", _re.I,
                                  )
                                  cands = []
                                  for link in soup.find_all("a", href=True):
                                      text = " ".join(
                                          link.get_text(" ", strip=True).split()
                                      )[:60]
                                      href = link["href"]
                                      if chart_re.search(href + " " + text):
                                          cands.append(
                                              (text, _urljoin(a.url, href))
                                          )
                                  print(f"       {len(cands)} chart-ish link(s)")
                                  seen_c = set()
                                  for text, href in cands:
                                      if href in seen_c:
                                          continue
                                      seen_c.add(href)
                                      if len(seen_c) > 10:
                                          break
                                      print(f"       ~[{text}] {href[:130]}")
                                  # Deepest recon (FI AD 2.24): when the charts
                                  # are not anchor-linked at all, print the RAW
                                  # markup of the "2.24 CHARTS" section so the
                                  # element type driving the chart rows (viewer
                                  # link, relative href without .pdf, object/
                                  # iframe, JS onclick) becomes visible.
                                  sec = None
                                  for tag in soup.find_all(
                                      ["h1", "h2", "h3", "h4", "td", "th", "div", "span"]
                                  ):
                                      txt = tag.get_text(" ", strip=True)
                                      if _re.search(r"2\.24|CHARTS RELATED", txt, _re.I):
                                          sec = tag
                                          break
                                  if sec is not None:
                                      block = sec
                                      for _ in range(4):
                                          if block.parent is not None:
                                              block = block.parent
                                      raw = block.decode()[:3500]
                                      print("       --- AD 2.24 raw markup ---")
                                      print("       " + raw.replace("\n", "\n       "))
                                  else:
                                      print("       (no 2.24 / CHARTS heading found on page)")
                          except Exception as re_err:
                              print(f"       recon failed: {type(re_err).__name__}: {re_err}")
              except Exception as e:
                  results[code] = None
                  print(f"{code}: FAILED - {type(e).__name__}: {e}")
                  traceback.print_exc()

          allowed = set(os.environ.get("ALLOWED_FAILURES", "").split())

          print("\n===== SUMMARY =====")
          for code, count in results.items():
              if count:
                  status = f"OK ({count} airports)"
              elif code in allowed:
                  status = "FAILED / 0 airports (allowed - known-blocked source)"
              else:
                  status = "FAILED / 0 airports"
              print(f"  {code}: {status}")

          failed = [c for c, n in results.items() if not n]
          hard_failed = [c for c in failed if c not in allowed]
          if failed and not hard_failed:
              print(f"Only known-blocked countries failed: {failed} - passing.")
          sys.exit(1 if hard_failed else 0)
          PY

      - name: Upload saved error responses
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: crawl-error-responses
          path: crawlers/error_logs/
          if-no-files-found: ignore
          retention-days: 7

      # Optional (Phase E): dump the AD 2.12 / 2.13 / 2.20 sections of the first
      # few fields of each given eurocontrol country, to design the AD-2 facts
      # parser (declared distances TORA/TODA/ASDA/LDA, runway characteristics,
      # circuit/local-traffic regulations). Reuses the crawler's own fetch (so
      # proxy/TLS config carries over) exactly like collect_ad23_hours. Kept as
      # the LAST step so its (small) output lands in the retrievable log tail.
      - name: AD-2 facts recon (2.12/2.13/2.20)
        if: ${{ inputs.ad2_recon != '' }}
        continue-on-error: true
        env:
          AD2_RECON: ${{ inputs.ad2_recon }}
          BRIGHTDATA_UNLOCKER_URL: ${{ secrets.BRIGHTDATA_UNLOCKER_URL }}
          BRIGHTDATA_PROXY_URL: ${{ secrets.BRIGHTDATA_PROXY_URL }}
        run: |
          uv run python - <<'PY'
          import logging, os, re
          # The eurocontrol crawlers log big per-field HTML warnings that flood
          # (and truncate) the run log - silence everything below ERROR so the
          # section dump below is the visible output.
          logging.disable(logging.WARNING)
          from main import COUNTRY_CRAWLERS
          from crawlers.http_eurocontrol_base import _AD2_SECTION1_RE

          # Section N .. next AD 2.(N+1 or two-digit) heading, language-agnostic
          # (anchors on the ICAO section number, like _AD23_SECTION_RE).
          def section(text, n):
              m = re.search(
                  rf"AD\s*2\.{n}\b(.*?)(?:\bAD\s*2\.(?:{n+1}|\d\d)\b)",
                  text, re.I | re.S,
              )
              return " ".join(m.group(1).split())[:1200] if m else None

          for code in os.environ["AD2_RECON"].split():
              code = code.upper()
              print(f"\n===== AD-2 recon {code} =====", flush=True)
              try:
                  crawler = COUNTRY_CRAWLERS[code]()
                  airports = crawler.crawl()
                  crawler.ensure_client_open()
              except Exception as e:
                  print(f"   crawl failed: {type(e).__name__}: {e}")
                  continue
              done = 0
              seen = set()
              for a in airports:
                  if not a.icao or done >= 3:
                      continue
                  base = (a.url or "").split("#", 1)[0]
                  if not base or a.icao in seen:
                      continue
                  # NL/SE multi-page: charts on section N, AD 2.12/2.13 on
                  # section 1 - try the raw url then the section-1 rewrite.
                  urls = [base]
                  s1 = _AD2_SECTION1_RE.sub(r"\g<1>1\g<2>", base)
                  if s1 != base:
                      urls.append(s1)
                  best = None
                  for url in urls:
                      try:
                          text = " ".join(
                              crawler.soup(crawler.fetch(url)).get_text(" ").split()
                          )
                      except Exception as e:
                          print(f"   {a.icao} fetch {url[:80]} failed: {type(e).__name__}: {e}")
                          continue
                      if section(text, 13) or section(text, 12):
                          best = (url, text)
                          break
                      best = best or (url, text)
                  if not best:
                      continue
                  seen.add(a.icao)
                  done += 1
                  url, text = best
                  print(f"\n   --- {a.icao} {a.title[:40]} {url[:110]}")
                  for n, label in ((12, "RWY PHYS"), (13, "DECL DIST"), (20, "LOCAL TRAFFIC")):
                      print(f"   [2.{n} {label}]: {section(text, n)}")
              try:
                  crawler.close()
              except Exception:
                  pass
          PY

      # Optional (Phase F2): DE-only OCR validation. DFS serves each AD-2 book
      # page as a base64 PNG, so the ONLY route to any DE AD-2 datum is OCR
      # (crawlers/crawlers/de_ocr.py). This crawls DE (httpx, fast), then runs
      # collect_ad2_ocr restricted to the given ICAOs (DE_OCR_ICAOS) and prints
      # the recognised text so its quality can be eyeballed against the DFS
      # page - WITHOUT publishing. Kept last so the output lands in the log tail.
      - name: DE AD-2 OCR recon
        if: ${{ inputs.de_ocr != '' }}
        continue-on-error: true
        env:
          # Restrict collect_ad2_ocr to the requested fields (comma-separated).
          DE_OCR_ICAOS: ${{ inputs.de_ocr }}
        run: |
          export DE_OCR_ICAOS="$(echo '${{ inputs.de_ocr }}' | tr ' ' ',')"
          echo "DE OCR recon for: $DE_OCR_ICAOS"
          uv run python - <<'PY'
          # DEEP probe: for each matched "AD 2 <ICAO> 1-<n>" text page, report
          # whether the content is real HTML TEXT (get_text) or a base64 PNG
          # image (biggest_png) - decides OCR vs direct text extraction.
          import logging, os
          from urllib.parse import urljoin
          logging.basicConfig(level=logging.INFO, format="%(levelname)s %(name)s: %(message)s")
          from crawlers.de import DE, _TEXT_PAGE_RE
          from crawlers.de_ocr import biggest_png, is_text_page, ocr_image

          allow = {c.strip().upper() for c in os.environ["DE_OCR_ICAOS"].split(",") if c.strip()}
          crawler = DE()
          airports = crawler.crawl()
          crawler.ensure_client_open()  # crawl() closed the httpx client
          fields = [a for a in airports if a.icao and a.icao in allow]
          print(f"\n##### matched {len(fields)} field(s): {[(a.icao, a.airport_type) for a in fields]}")
          for ap in fields:
              print(f"\n===== {ap.icao} [{ap.airport_type}] landing {ap.url}")
              try:
                  html = crawler.render_html(ap.url)
              except Exception as e:
                  print(f"  render FAILED: {type(e).__name__}: {e}"); continue
              base = getattr(crawler, "last_url", ap.url)
              hrefs = []
              for a in crawler.soup(html).find_all("a", href=True):
                  m = _TEXT_PAGE_RE.match(a.get_text(" ", strip=True))
                  if m and m.group(1) == ap.icao:
                      hrefs.append((a.get_text(" ", strip=True)[:24], a["href"]))
              print(f"  {len(hrefs)} text-page match(es): {[t for t, _ in hrefs]}")
              for label, h in list(dict.fromkeys(hrefs))[:2]:
                  url2 = urljoin(base, h)
                  _, page_html = crawler._fetch(url2)
                  txt = " ".join(crawler.soup(page_html).get_text(" ").split())
                  png = biggest_png(page_html)
                  print(f"  --- {label}: html={len(page_html)} get_text={len(txt)} png={len(png) if png else 0}")
                  print(f"      get_text head: {txt[:400]}")
                  if png:
                      o = ocr_image(png)
                      print(f"      OCR {len(o)} chars is_text={is_text_page(o)} head: {o[:300]}")
          crawler.close()
          PY
