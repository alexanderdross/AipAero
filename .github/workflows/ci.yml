name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

# Don't waste runners re-running superseded PR pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  website:
    name: Website (Next.js)
    runs-on: self-hosted
    timeout-minutes: 10
    env:
      # Belt-and-suspenders: env validation is only invoked at runtime/build,
      # but setting this avoids surprises if a lint/typecheck plugin loads
      # next.config.mjs.
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js (pnpm cache)
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: i18n key parity
        run: node scripts/check-i18n.mjs

      - name: Unit tests
        run: pnpm test

      - name: Audit dependencies (high+)
        # Fails on high or critical advisories. Complements Dependabot
        # security updates by gating PRs that touch the lockfile.
        run: pnpm audit --audit-level=high --prod

      # The website deploys to Cloudflare Workers via the OpenNext adapter.
      # The build no longer needs a database: DB reads go through the `DB`
      # D1 binding, which is absent at build time, so `getDb()` returns null
      # and the sitemap/pages prerender with empty results and revalidate at
      # runtime. That makes it safe to gate PRs on the Worker build here.
      - name: Build (OpenNext / Cloudflare Workers)
        run: pnpm cf-build

  crawlers:
    name: Crawlers (Python)
    runs-on: self-hosted
    timeout-minutes: 10
    defaults:
      run:
        working-directory: crawlers
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: crawlers/uv.lock

      - name: Setup Python
        run: uv python install 3.12

      - name: Verify uv.lock matches pyproject.toml
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen

      - name: Compile-check all Python sources
        run: uv run python -m compileall -q crawlers main.py output_handler.py settings.py

      - name: Import smoke test for HTTP-based crawlers
        run: |
          uv run python - <<'PY'
          from crawlers.at import AT
          from crawlers.de import DE
          from crawlers.fr import FR
          from crawlers.nl import NL
          from crawlers.uk import UK

          for cls in (AT, DE, FR, NL, UK):
              inst = cls()
              assert inst.country == cls.__name__, (cls, inst.country)
              inst.close()
          print("HTTP crawler import smoke test OK")
          PY

      - name: Unit tests
        run: uv run pytest tests/

  e2e:
    name: E2E & rendered output (Playwright)
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      # The build fail-softs DB reads (no D1 binding), so no secrets are
      # needed to compile; the test server injects fake ones at runtime.
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js (pnpm cache)
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      # `next start` needs a production build; the Playwright webServer boots
      # `pnpm start` against it. These rendered-output tests reproduce the
      # streaming-metadata / <head> placement behaviour that unit tests can't.
      - name: Build
        run: pnpm build

      - name: Run Playwright tests (SEO / a11y / flows / sitemap)
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse budgets (local)
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js (pnpm cache)
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chrome for Lighthouse
        # The self-hosted runner (ubuntu-noble) ships no browser and Ubuntu's
        # `chromium` is snap-only, so install Chrome from the official .deb.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends wget ca-certificates
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          apt-get install -y --no-install-recommends /tmp/chrome.deb
          rm /tmp/chrome.deb

      - name: Build
        run: pnpm build

      - name: Start production server
        run: |
          SKIP_ENV_VALIDATION=1 NODE_ENV=production CRON_SECRET=test-secret \
            ADSENSE_ID=0000000000000000 nohup pnpm start >/tmp/next-start.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf -o /dev/null http://localhost:3000/uk/ && exit 0
            sleep 1
          done
          echo "server did not start"; cat /tmp/next-start.log; exit 1

      - name: Run Lighthouse (budgets in .lighthouserc.cjs)
        uses: treosh/lighthouse-ci-action@v12
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable
        with:
          urls: |
            http://localhost:3000/uk/
            http://localhost:3000/de/
            http://localhost:3000/de/vfr/
            http://localhost:3000/de/flughafen-liste-deutschland/
          configPath: ./.lighthouserc.cjs
          uploadArtifacts: true
          temporaryPublicStorage: true
