name: Lighthouse

# Runs Lighthouse against a deployed preview/production Worker URL and posts
# the scores as a job summary. Budgets live in .lighthouserc.cjs (SEO + a11y
# gate, best-practices + performance warn) and apply here too. PRs are gated
# separately by the `lighthouse` job in ci.yml against a local `pnpm start`.
#
# The website deploys to Cloudflare Workers via the OpenNext adapter, which
# does not post a per-PR GitHub deployment status (the old flow polled Vercel's
# status). Run this manually against a preview/production Worker URL, e.g. the
# `pnpm preview` tunnel, a `workers.dev` deploy, or aip.aero once cut over.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL of the deployed site to audit (no trailing slash), e.g. https://aip-aero.<subdomain>.workers.dev"
        required: true
        type: string
      paths:
        description: "Optional space-separated path list overriding the default page set (trailing-slash canonical form, e.g. '/uk/ /de/vfr/?EDNY')"
        required: false
        type: string
        default: ""

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse (Workers preview)
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0

      # Node 22 before the Lighthouse action: current Lighthouse uses
      # `import ... with { type: 'json' }`, which the runner's default Node 18
      # cannot parse (SyntaxError: Unexpected token 'with') - same reason
      # ci.yml's lighthouse job pins Node first.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Chrome for Lighthouse
        # The self-hosted runner (ubuntu-noble) ships no browser and Ubuntu's
        # `chromium` is snap-only, so install Chrome from the official .deb.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends wget ca-certificates
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          apt-get install -y --no-install-recommends /tmp/chrome.deb
          rm /tmp/chrome.deb

      - name: Build URL list
        id: urls
        env:
          BASE_URL: ${{ inputs.base_url }}
          PATHS: ${{ inputs.paths }}
        # Default: representative URLs across locales and page types (keep the
        # list small - each URL adds ~15-30s). The `paths` input overrides it
        # for one-off broader audits. Trailing slashes: the site sets
        # `trailingSlash: true`, so the slashless form 308-redirects -
        # auditing it would charge the redirect hop against the perf score.
        run: |
          if [ -z "$PATHS" ]; then
            PATHS="/uk/ /uk/vfr/ /de/ /de/ifr/ /de/flughafen-liste-deutschland/"
          fi
          {
            echo "list<<EOF"
            for p in $PATHS; do echo "${BASE_URL}${p}"; done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        id: lhci
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable
        with:
          urls: ${{ steps.urls.outputs.list }}
          configPath: ./.lighthouserc.cjs
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Format Lighthouse results
        id: format
        if: always() && steps.lhci.outputs.manifest
        env:
          MANIFEST: ${{ steps.lhci.outputs.manifest }}
          LINKS: ${{ steps.lhci.outputs.links }}
        run: |
          node - <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const manifest = JSON.parse(process.env.MANIFEST);
          const links = JSON.parse(process.env.LINKS);
          const fmt = (n) => Math.round(n * 100);
          const rows = manifest
            .filter((r) => r.isRepresentativeRun)
            .map((r) => {
              const s = r.summary;
              const report = links[r.url] ?? "";
              const url = new URL(r.url).pathname || "/";
              return `| \`${url}\` | ${fmt(s.performance)} | ${fmt(s.accessibility)} | ${fmt(s["best-practices"])} | ${fmt(s.seo)} | [report](${report}) |`;
            })
            .join("\n");
          const body = [
            "## Lighthouse results",
            "",
            "| URL | Perf | A11y | Best Practices | SEO | Report |",
            "| --- | ---: | ---: | ---: | ---: | --- |",
            rows,
            "",
            "_Budgets in .lighthouserc.cjs: SEO + accessibility gate, best-practices + performance warn._",
          ].join("\n");
          console.log(body);
          NODE
