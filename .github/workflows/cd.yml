name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploys nicht überlappen lassen; ein laufendes Deploy nicht abbrechen.
concurrency:
  group: cd-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy (Cloudflare Workers)
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      SKIP_ENV_VALIDATION: "1"
      # Wrangler/OpenNext authentifizieren sich nicht-interaktiv über diese
      # beiden Variablen (kein `wrangler login` im CI).
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v7.0.0

      # Node 22 zuerst einrichten, damit der pnpm-Self-Installer nicht unter
      # dem alten System-Node (18.x) des self-hosted Runners läuft.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js (pnpm cache)
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Schema-Änderungen auf die Remote-D1 anwenden, bevor der neue
      # Worker-Code live geht (additive Migrationen zuerst).
      - name: Apply D1 migrations (remote)
        run: pnpm exec wrangler d1 migrations apply DB --remote

      # Baut den OpenNext-Worker (setzt NEXT_PUBLIC_BUILD_DATE).
      - name: Build (OpenNext / Cloudflare Workers)
        run: pnpm run cf-build

      # Deployt via wrangler direkt statt `opennextjs-cloudflare deploy`, um die
      # Populate-Cache-Phase zu überspringen: die schreibt den Incremental-Cache
      # per KV-Bulk-Put und läuft auf dem Free-Plan ins tägliche KV-Schreiblimit
      # (code 10048). Der ISR-Cache wärmt sich stattdessen zur Laufzeit.
      #
      # OPEN_NEXT_DEPLOY=true verhindert, dass `wrangler deploy` das OpenNext-
      # Projekt erkennt und zurück an `opennextjs-cloudflare deploy` (inkl.
      # KV-Population) delegiert. Damit ist es ein reiner Worker+Assets-Deploy.
      - name: Deploy (wrangler)
        env:
          OPEN_NEXT_DEPLOY: "true"
        run: pnpm exec wrangler deploy
