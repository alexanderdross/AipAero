name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploys nicht überlappen lassen; ein laufendes Deploy nicht abbrechen.
concurrency:
  group: cd-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy (Cloudflare Workers)
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      SKIP_ENV_VALIDATION: "1"
      # Wrangler/OpenNext authentifizieren sich nicht-interaktiv über diese
      # beiden Variablen (kein `wrangler login` im CI).
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v7.0.0

      # Node 22 zuerst einrichten, damit der pnpm-Self-Installer nicht unter
      # dem alten System-Node (18.x) des self-hosted Runners läuft.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js (pnpm cache)
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Schema-Änderungen auf die Remote-D1 anwenden, bevor der neue
      # Worker-Code live geht (additive Migrationen zuerst).
      - name: Apply D1 migrations (remote)
        run: pnpm exec wrangler d1 migrations apply DB --remote

      # Baut den OpenNext-Worker (setzt NEXT_PUBLIC_BUILD_DATE).
      - name: Build (OpenNext / Cloudflare Workers)
        run: pnpm run cf-build

      # Der Build hat keine DB - die Flughafenlisten + per-Land-Sitemaps
      # prerendern LEER. `opennextjs-cloudflare deploy` seedet diese leeren
      # Prerender via populateCache in den R2-Incremental-Cache und
      # ueberschreibt dabei die LIVE gefuellten Eintraege (das ~4-min-Leer-
      # Fenster nach jedem Deploy). Wir entfernen GENAU diese DB-abhaengigen
      # Cache-Assets aus dem Build-Output, damit populateCache sie ueberspringt:
      # ihre gefuellten R2-Eintraege ueberleben den Deploy, und der Post-Deploy-
      # `/api/revalidate` bustet die country-Tags -> die Seiten regenerieren aus
      # der LIVE-D1 mit dem neuen Code (stale-while-revalidate serviert die
      # gefuellte Kopie waehrend der Regeneration, NIE leer). Alle uebrigen
      # (statischen) Seiten - Startseiten, terms, efb, llms.txt, Sitemap-Index -
      # bleiben im Seed und werden wie gehabt aktualisiert. Der Sitemap-INDEX
      # (`2d6a9a/index.xml`) haengt nicht an der DB (nur liveCountries) und
      # bleibt daher bewusst drin.
      - name: Exclude the DB-seeded lists + sitemaps from the empty cache seed
        run: |
          before=$(find .open-next/cache -type f -name '*.cache' | wc -l)
          find .open-next/cache -type f -name 'airport-list.cache' -delete
          find .open-next/cache -type f -path '*/2d6a9a/sitemap/*.xml.cache' -delete
          after=$(find .open-next/cache -type f -name '*.cache' | wc -l)
          echo "Excluded $((before - after)) DB-dependent cache assets ($before -> $after)."

      # Deployt den Worker und befuellt den Incremental-Cache vor (R2; hohes
      # Write-Kontingent). Die im Schritt oben entfernten DB-Seiten werden
      # NICHT ge-seedet und behalten so ihre gefuellten R2-Eintraege.
      - name: Deploy (OpenNext → Cloudflare)
        run: pnpm exec opennextjs-cloudflare deploy

      # Die DB-Listen sind vom Leer-Seed AUSGENOMMEN (Schritt oben) - sie
      # behalten also ihre gefuellten R2-Eintraege ueber den Deploy. Dieser
      # Refresh bustet die country-Tags (`/api/revalidate`), damit die Listen
      # aus der LIVE-D1 mit dem NEUEN Code regenerieren (stale-while-revalidate
      # serviert die gefuellte Kopie waehrend der Regeneration - nie leer), und
      # waermt die schweren Seiten off-path. Der Verify-Loop bleibt als NETZ:
      # er prueft, dass die schwerste Liste Zeilen traegt (voller Render = viele
      # row-link-icon <use>; ein hypothetischer Leer-Zustand haette null) und
      # wiederholt sonst - er sollte jetzt aber in Runde 1 gruen sein. Fail-soft:
      # ohne CRON_SECRET / nach allen Runden nur eine Warnung (ISR heilt <=1h).
      - name: Refresh + verify prerendered lists (self-healing)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::warning::CRON_SECRET repo secret not set - skipping post-deploy refresh (pages heal via ISR within 1h or on the next crawler POST)"
            exit 0
          fi

          urls=(
            "https://aip.aero/de/flughafen-liste-deutschland/"
            "https://aip.aero/at/flughafen-liste-oesterreich/"
            "https://aip.aero/fr/liste-des-aeroports-francais/"
            "https://aip.aero/nl/luchthavenlijst-nederland/"
            "https://aip.aero/uk/airport-list-uk/"
            "https://aip.aero/be/airport-list-belgium/"
            "https://aip.aero/cz/letiste-cesko/"
            "https://aip.aero/dk/flyvepladser-danmark/"
            "https://aip.aero/no/flyplasser-norge/"
            "https://aip.aero/pl/lotniska-polska/"
            "https://aip.aero/se/flygplatser-sverige/"
            "https://aip.aero/ee/lennuvaljade-nimekiri-eesti/"
            "https://aip.aero/fi/lentopaikat-suomi/"
            "https://aip.aero/es/lista-de-aeropuertos-espana/"
            "https://aip.aero/lv/lidlauku-saraksts-latvija/"
            "https://aip.aero/is/flugvallalisti-island/"
            "https://aip.aero/pt/lista-de-aerodromos-portugal/"
            "https://aip.aero/hu/repuloterek-listaja-magyarorszag/"
            "https://aip.aero/si/seznam-letalisc-slovenija/"
            "https://aip.aero/lt/oro-uostu-sarasas-lietuva/"
            "https://aip.aero/rs/lista-aerodroma-srbija/"
            "https://aip.aero/ie/airport-list-ireland/"
            "https://aip.aero/sk/letiska-slovensko/"
            "https://aip.aero/gr/aerolimenes-ellada/"
            "https://aip.aero/ba/lista-aerodroma-bih/"
            "https://aip.aero/ch/flugplaetze-schweiz/"
            "https://aip.aero/al/aeroportet-shqiperi/"
            "https://aip.aero/mk/aerodromi-severna-makedonija/"
            "https://aip.aero/ro/lista-aeroporturi-romania/"
            "https://aip.aero/cy/aerolimenes-kypros/"
            "https://aip.aero/mt/airport-list-malta/"
            "https://aip.aero/md/lista-aeroporturi-moldova/"
            "https://aip.aero/it/elenco-aeroporti-italia/"
            "https://aip.aero/hr/popis-zracnih-luka-hrvatska/"
            "https://aip.aero/bg/letishta-balgariya/"
            "https://aip.aero/tr/havalimanlari-turkiye/"
            "https://aip.aero/ge/aeroportebi-sakartvelo/"
            "https://aip.aero/am/odanavakayanner-hayastan/"
            "https://aip.aero/az/hava-limanlari-azerbaycan/"
            "https://aip.aero/ua/perelik-aeroportiv-ukrayina/"
            "https://aip.aero/uz/aeroportlar-royxati-ozbekiston/"
            "https://aip.aero/by/pieralik-aeraportau-bielarus/"
            "https://aip.aero/kz/aeroportar-tizimi-qazaqstan/"
            "https://aip.aero/xk/lista-e-aeroporteve-kosove/"
            "https://aip.aero/ru/spisok-aeroportov-rossiya/"
            "https://aip.aero/tj/ruyxati-furudgohhoi-tojikiston/"
            "https://aip.aero/tm/turkmenistan-howa-menzilleri/"
            "https://aip.aero/kg/kyrgyzstan-aeroporttor-tizmesi/"
            # English-locale (`<cc>/en`) lists are SEPARATE prerenders; the
            # native + English list read the same country-tagged data, but
            # each page HTML is cached per route, so an un-warmed English
            # list serves the empty build seed while the native one is filled
            # (the it/en list-empty bug, 18.07.2026). x-default points at the
            # English page, so it must never be empty. Single-locale countries
            # (uk/be/ie/mt) have no -EN partner and are already covered above.
            "https://aip.aero/at/en/airport-list-austria/"
            "https://aip.aero/de/en/airport-list-germany/"
            "https://aip.aero/fr/en/airport-list-france/"
            "https://aip.aero/nl/en/airport-list-netherlands/"
            "https://aip.aero/cz/en/airport-list-czechia/"
            "https://aip.aero/no/en/airport-list-norway/"
            "https://aip.aero/pl/en/airport-list-poland/"
            "https://aip.aero/se/en/airport-list-sweden/"
            "https://aip.aero/ee/en/airport-list-estonia/"
            "https://aip.aero/fi/en/airport-list-finland/"
            "https://aip.aero/es/en/airport-list-spain/"
            "https://aip.aero/lv/en/airport-list-latvia/"
            "https://aip.aero/is/en/airport-list-iceland/"
            "https://aip.aero/pt/en/airport-list-portugal/"
            "https://aip.aero/hu/en/airport-list-hungary/"
            "https://aip.aero/si/en/airport-list-slovenia/"
            "https://aip.aero/dk/en/airport-list-denmark/"
            "https://aip.aero/lt/en/airport-list-lithuania/"
            "https://aip.aero/rs/en/airport-list-serbia/"
            "https://aip.aero/sk/en/airport-list-slovakia/"
            "https://aip.aero/gr/en/airport-list-greece/"
            "https://aip.aero/ba/en/airport-list-bosnia/"
            "https://aip.aero/ch/en/airport-list-switzerland/"
            "https://aip.aero/al/en/airport-list-albania/"
            "https://aip.aero/mk/en/airport-list-north-macedonia/"
            "https://aip.aero/ro/en/airport-list-romania/"
            "https://aip.aero/cy/en/airport-list-cyprus/"
            "https://aip.aero/md/en/airport-list-moldova/"
            "https://aip.aero/it/en/airport-list-italy/"
            "https://aip.aero/hr/en/airport-list-croatia/"
            "https://aip.aero/bg/en/airport-list-bulgaria/"
            "https://aip.aero/tr/en/airport-list-turkey/"
            "https://aip.aero/ge/en/airport-list-georgia/"
            "https://aip.aero/am/en/airport-list-armenia/"
            "https://aip.aero/az/en/airport-list-azerbaijan/"
            "https://aip.aero/ua/en/airport-list-ukraine/"
            "https://aip.aero/uz/en/airport-list-uzbekistan/"
            "https://aip.aero/by/en/airport-list-belarus/"
            "https://aip.aero/kz/en/airport-list-kazakhstan/"
            "https://aip.aero/xk/en/airport-list-kosovo/"
            "https://aip.aero/ru/en/airport-list-russia/"
            "https://aip.aero/tj/en/airport-list-tajikistan/"
            "https://aip.aero/tm/en/airport-list-turkmenistan/"
            "https://aip.aero/kg/en/airport-list-kyrgyzstan/"
          )
          # NOTE: this list MUST carry EVERY live country's airport-list URL
          # (liveCountries in src/lib/utils.ts x the /airport-list slug in
          # src/i18n/routing.ts). A launched country missing here is never
          # warmed post-deploy, so its list page serves the empty build seed
          # (skeleton) until the 1h ISR TTL - the CH/BA regression of 15.07.2026.
          # Heaviest list; a full render carries per-row row-link-icon <use>
          # markers, the empty build seed has zero - the proof of regeneration.
          revalidate() {
            for i in 1 2 3; do
              code=$(curl -sSL -o /tmp/revalidate.out -w '%{http_code}' -X POST \
                -H "Authorization: Bearer $CRON_SECRET" \
                https://aip.aero/api/revalidate) || code=000
              cat /tmp/revalidate.out || true; echo " (revalidate HTTP $code)"
              [ "$code" = "200" ] && return 0
              sleep $((i * 5))
            done
            return 1
          }
          # Fetch EVERY live-country list and count its per-row markers (a full
          # render carries many `use href="#row-link-icon"`; an empty build seed
          # or a stale cache has zero). This both warms and VERIFIES each list,
          # so a single country going empty - the TR/cache-stale class of bug,
          # 18.07.2026 - is caught per-country on every deploy, not just DE.
          # Sets the global EMPTY to the space-separated list of empty URLs.
          check_all() {
            EMPTY=""
            for u in "${urls[@]}"; do
              rows=$(curl -sSL --max-time 60 "$u" \
                | grep -o 'use href="#row-link-icon"' | wc -l | tr -d ' ')
              echo "verify $u -> ${rows:-0} rows"
              [ "${rows:-0}" -ge 1 ] || EMPTY="$EMPTY $u"
            done
          }

          # Short settle for the deploy to propagate. No empty-seed race to
          # wait out anymore (the DB lists are excluded from the seed), so this
          # is just propagation - the verify loop below confirms the outcome.
          sleep 15
          for round in 1 2 3 4 5; do
            echo "== refresh round $round =="
            revalidate || echo "::warning::revalidate failed in round $round"
            check_all
            if [ -z "$EMPTY" ]; then
              echo "All ${#urls[@]} live-country lists verified non-empty after round $round."
              exit 0
            fi
            echo "::warning::Empty airport lists after round $round:$EMPTY"
            echo "Still empty; waiting before the next round."
            sleep 45
          done
          echo "::warning::Airport lists still EMPTY after all refresh rounds:$EMPTY - a launched country with no data yet heals on its next crawler POST; an already-populated country going empty here is a cache/regression to investigate"
          exit 0
