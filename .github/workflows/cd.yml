name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

# Deploys nicht überlappen lassen; ein laufendes Deploy nicht abbrechen.
concurrency:
  group: cd-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy (Cloudflare Workers)
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      SKIP_ENV_VALIDATION: "1"
      # Wrangler/OpenNext authentifizieren sich nicht-interaktiv über diese
      # beiden Variablen (kein `wrangler login` im CI).
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v7.0.0

      # Node 22 zuerst einrichten, damit der pnpm-Self-Installer nicht unter
      # dem alten System-Node (18.x) des self-hosted Runners läuft.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js (pnpm cache)
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Schema-Änderungen auf die Remote-D1 anwenden, bevor der neue
      # Worker-Code live geht (additive Migrationen zuerst).
      - name: Apply D1 migrations (remote)
        run: pnpm exec wrangler d1 migrations apply DB --remote

      # Baut den OpenNext-Worker (setzt NEXT_PUBLIC_BUILD_DATE).
      - name: Build (OpenNext / Cloudflare Workers)
        run: pnpm run cf-build

      # Deployt den Worker und befüllt den Incremental-Cache vor. Der Cache liegt
      # jetzt auf R2 (statt KV), dessen Write-Kontingent um Größenordnungen höher
      # ist — die Populate-Phase (~36 Class-A-Writes) ist damit unkritisch, daher
      # nutzen wir wieder den regulären OpenNext-Deploy (kein OPEN_NEXT_DEPLOY-
      # Workaround mehr nötig).
      - name: Deploy (OpenNext → Cloudflare)
        run: pnpm exec opennextjs-cloudflare deploy

      # Der Build hat keine DB - alle statischen Seiten (Flughafenlisten,
      # Sitemaps) werden LEER vorgerendert und beim Deploy in den Cache
      # geseedet. Dieser Aufruf bustet direkt nach dem Deploy alle
      # country-Tags, damit die Seiten sofort aus der echten D1 regenerieren
      # statt bis zum nächsten Crawler-POST leer zu bleiben. Fail-soft: ohne
      # CRON_SECRET-Secret (oder bei Fehlern) nur eine Warnung - die ISR-
      # Stundenrevalidierung heilt die Seiten dann spätestens nach 1h.
      - name: Revalidate all countries (refresh prerendered pages)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::warning::CRON_SECRET repo secret not set - skipping post-deploy revalidation (pages refresh via ISR within 1h or on the next crawler POST)"
            exit 0
          fi
          # Kurz warten: die parallele Workers-Builds-Git-Integration deployt
          # denselben Commit; erst nach deren Cache-Seeding revalidieren.
          sleep 90
          for i in 1 2 3; do
            code=$(curl -sSL -o /tmp/revalidate.out -w '%{http_code}' -X POST \
              -H "Authorization: Bearer $CRON_SECRET" \
              https://aip.aero/api/revalidate) || code=000
            cat /tmp/revalidate.out || true; echo " (HTTP $code)"
            if [ "$code" = "200" ]; then exit 0; fi
            echo "Attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done
          echo "::warning::Post-deploy revalidation failed - pages refresh via ISR within 1h or on the next crawler POST"
          exit 0

      # The country airport-list pages are the heaviest to render. The revalidate
      # above marks them stale, so the first request regenerates them on the
      # Worker - a cold render that, for the large DE list, has hit the Worker
      # resource limit (Error 1102) on a real user. Do that regeneration here,
      # off the user's request path, so visitors always get the cached HTML.
      # Best-effort: never fail the deploy on a warm-up hiccup.
      - name: Warm up the large list pages
        run: |
          urls=(
            "https://aip.aero/de/flughafen-liste-deutschland/"
            "https://aip.aero/at/flughafen-liste-oesterreich/"
            "https://aip.aero/fr/liste-des-aeroports-francais/"
            "https://aip.aero/nl/luchthavenlijst-nederland/"
            "https://aip.aero/uk/airport-list-uk/"
            "https://aip.aero/be/airport-list-belgium/"
            "https://aip.aero/cz/letiste-cesko/"
            "https://aip.aero/no/flyplasser-norge/"
            "https://aip.aero/pl/lotniska-polska/"
            "https://aip.aero/se/flygplatser-sverige/"
          )
          for u in "${urls[@]}"; do
            code=$(curl -sSL -o /dev/null -w '%{http_code}' --max-time 60 "$u") || code=000
            echo "warm $u -> HTTP $code"
          done
          exit 0
