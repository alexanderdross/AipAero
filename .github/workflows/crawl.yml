name: Crawl (publish)

# Runs the production country crawlers on the self-hosted runner and PUBLISHES
# the results to https://aip.aero/api/airports (Bearer CRON_SECRET). This
# replaces the old systemd timer on the netcup host: Actions checks out the
# repo fresh each run (no code drift), reuses the runner that already runs the
# live-test, and gives run logs + a manual trigger. The weekly OurAirports
# facts import is a separate workflow (facts-import.yml).
#
# Trigger: nightly on schedule, or manually (Actions -> Crawl (publish) -> Run
# workflow), optionally for a subset of countries.

on:
  schedule:
    - cron: "0 3 * * *" # daily 03:00 UTC
  workflow_dispatch:
    inputs:
      countries:
        description: "Space-separated country codes to crawl (empty = all 12)"
        required: false
        default: ""
      force_publish:
        description: "Publish even if a country's count dropped > 50% (parser-bug guard override)"
        type: boolean
        default: false

# Never let two publish runs overlap (they delete+insert per country in D1).
concurrency:
  group: crawl-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  crawl:
    name: Crawl live sources + publish
    runs-on: self-hosted
    timeout-minutes: 30
    defaults:
      run:
        working-directory: crawlers
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: crawlers/uv.lock

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      # Headless Chromium for the DK JS-rendering fallback. Best-effort: a
      # failure must not abort the whole crawl (DK then fails soft to 0).
      - name: Install Playwright Chromium
        continue-on-error: true
        run: uv run playwright install chromium --with-deps

      # Carry the per-country "last successful count" across runs so the
      # OutputHandler's > 50% drop guard (parser-bug protection) survives the
      # ephemeral, fresh-checkout runner. Rolling key: always restores the
      # latest crawler-counts-* entry and saves a new one post-job.
      - name: Restore last-run counts (drop guard)
        uses: actions/cache@v4
        with:
          path: crawlers/last_run_counts.json
          key: crawler-counts-${{ github.run_id }}
          restore-keys: |
            crawler-counts-

      - name: Crawl + publish
        env:
          # Settings() (pydantic-settings) reads these case-insensitively.
          API_ENDPOINT: https://aip.aero/api/airports
          API_KEY: ${{ secrets.CRON_SECRET }}
          LOG_LEVEL: INFO
          LOG_FILE: crawl.log
          # Bright Data zones for blocked sources (optional). UNLOCKER solves
          # the GR captcha; PROXY is the plain IP-block proxy.
          BRIGHTDATA_UNLOCKER_URL: ${{ secrets.BRIGHTDATA_UNLOCKER_URL }}
          BRIGHTDATA_PROXY_URL: ${{ secrets.BRIGHTDATA_PROXY_URL }}
          # Passed via env (not string-interpolated into the run line) so a
          # dispatch input can never inject shell. Empty on schedule = all.
          COUNTRIES: ${{ inputs.countries }}
          CRAWLER_FORCE_PUBLISH: ${{ inputs.force_publish && '1' || '' }}
        # Unquoted $COUNTRIES so it word-splits into per-country args.
        run: uv run main.py $COUNTRIES

      # Each published country busts its `country:<CC>` cache tags - without a
      # warm-up, the FIRST visitor of a heavy chart list after the nightly
      # crawl pays the synchronous regeneration (measured 2026-07-12 as the
      # LCP 3.1s / Lighthouse 92 tail on the DE list). Same pattern as the
      # post-deploy warm-up in cd.yml. Best-effort: never fail the crawl run.
      - name: Warm up the large list pages
        if: ${{ !cancelled() }}
        working-directory: .
        run: |
          urls=(
            "https://aip.aero/de/flughafen-liste-deutschland/"
            "https://aip.aero/at/flughafen-liste-oesterreich/"
            "https://aip.aero/fr/liste-des-aeroports-francais/"
            "https://aip.aero/nl/luchthavenlijst-nederland/"
            "https://aip.aero/uk/airport-list-uk/"
            "https://aip.aero/be/airport-list-belgium/"
            "https://aip.aero/cz/letiste-cesko/"
            "https://aip.aero/dk/flyvepladser-danmark/"
            "https://aip.aero/no/flyplasser-norge/"
            "https://aip.aero/pl/lotniska-polska/"
            "https://aip.aero/se/flygplatser-sverige/"
            "https://aip.aero/ee/lennuvaljade-nimekiri-eesti/"
            "https://aip.aero/fi/lentopaikat-suomi/"
            "https://aip.aero/es/lista-de-aeropuertos-espana/"
            "https://aip.aero/lv/lidlauku-saraksts-latvija/"
            "https://aip.aero/is/flugvallalisti-island/"
            "https://aip.aero/pt/lista-de-aerodromos-portugal/"
            "https://aip.aero/hu/repuloterek-listaja-magyarorszag/"
            "https://aip.aero/si/seznam-letalisc-slovenija/"
            "https://aip.aero/lt/oro-uostu-sarasas-lietuva/"
            "https://aip.aero/rs/lista-aerodroma-srbija/"
            "https://aip.aero/ie/airport-list-ireland/"
            "https://aip.aero/sk/letiska-slovensko/"
            "https://aip.aero/gr/aerolimenes-ellada/"
            "https://aip.aero/ba/lista-aerodroma-bih/"
            "https://aip.aero/ch/flugplaetze-schweiz/"
            "https://aip.aero/al/aeroportet-shqiperi/"
            "https://aip.aero/mk/aerodromi-severna-makedonija/"
            "https://aip.aero/ro/lista-aeroporturi-romania/"
            "https://aip.aero/cy/aerolimenes-kypros/"
            "https://aip.aero/mt/airport-list-malta/"
            "https://aip.aero/md/lista-aeroporturi-moldova/"
            "https://aip.aero/it/elenco-aeroporti-italia/"
            "https://aip.aero/hr/popis-zracnih-luka-hrvatska/"
            "https://aip.aero/bg/letishta-balgariya/"
            "https://aip.aero/tr/havalimanlari-turkiye/"
            "https://aip.aero/ge/aeroportebi-sakartvelo/"
            "https://aip.aero/am/odanavakayanner-hayastan/"
            "https://aip.aero/az/hava-limanlari-azerbaycan/"
            "https://aip.aero/ua/perelik-aeroportiv-ukrayina/"
            "https://aip.aero/uz/aeroportlar-royxati-ozbekiston/"
            "https://aip.aero/by/pieralik-aeraportau-bielarus/"
            "https://aip.aero/kz/aeroportar-tizimi-qazaqstan/"
            "https://aip.aero/xk/lista-e-aeroporteve-kosove/"
          )
          # NOTE: keep this in sync with liveCountries x the /airport-list slug
          # (src/lib/utils.ts + src/i18n/routing.ts). A launched country missing
          # here just isn't pre-warmed after a crawl (the crawler's revalidateTag
          # still busts its tag, so the first visitor triggers regeneration).
          for u in "${urls[@]}"; do
            code=$(curl -sSL -o /dev/null -w '%{http_code}' --max-time 60 "$u") || code=000
            echo "warm $u -> HTTP $code"
          done
          exit 0

      - name: Upload crawl log
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: crawl-log
          path: crawlers/crawl.log
          if-no-files-found: ignore
          retention-days: 7
