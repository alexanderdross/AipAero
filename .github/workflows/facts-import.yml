name: Airport facts import (OurAirports)

# Imports the OurAirports open dataset (CC0) into the D1 `airport_facts` table
# via POST https://aip.aero/api/airport-facts (Bearer CRON_SECRET). These rows
# provide coordinates (-> the "airports near me" map), elevation, runways and
# frequencies; the website merges them with OpenAIP at request time. Facts
# change rarely, so this runs weekly. Idempotent (upsert), safe to re-run.
#
# Trigger: weekly on schedule, or manually (Actions -> Airport facts import ->
# Run workflow). Not a country crawler - it is not in main.py.

on:
  schedule:
    - cron: "30 3 * * 0" # weekly, Sunday 03:30 UTC
  workflow_dispatch:
    inputs:
      geocode:
        description: "Also reverse-geocode every field's postal address (GEOCODE=1, ~30-60 min at Nominatim's 1 req/s) so the detail pages read it from D1 instead of geocoding live"
        required: false
        type: boolean
        default: false
      backfill:
        description: "Run the OpenAIP coord backfill instead of the OurAirports import: fill coordinates for fields OurAirports never carried (hospital heliports / small ULM strips) so they appear on the map"
        required: false
        type: boolean
        default: false
      apply:
        description: "Backfill only: actually POST to D1. Off = dry-run (log what it would write, no data change)"
        required: false
        type: boolean
        default: false
      icaos:
        description: "Backfill only (optional): space/comma-separated ICAOs to target instead of the auto missing-list (e.g. a spot-check or a targeted re-run)"
        required: false
        default: ""

concurrency:
  group: facts-import
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  import:
    name: Import OurAirports facts
    runs-on: self-hosted
    # 90 min headroom for the optional GEOCODE pass (Nominatim allows 1 req/s;
    # ~2-3k fields). The plain weekly import finishes in a couple of minutes.
    timeout-minutes: 90
    defaults:
      run:
        working-directory: crawlers
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: crawlers/uv.lock

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      # The weekly OurAirports import. Skipped on a manual backfill-only run so
      # a coord-backfill dry-run does not also re-post the whole dataset.
      - name: Import OurAirports facts -> D1
        if: ${{ github.event_name == 'schedule' || !inputs.backfill }}
        env:
          API_BASE: https://aip.aero
          API_KEY: ${{ secrets.CRON_SECRET }}
          # Empty unless the dispatch input asks for the address backfill -
          # the importer only checks whether GEOCODE is set/non-empty.
          GEOCODE: ${{ inputs.geocode == true && '1' || '' }}
        run: uv run python import_ourairports.py

      # OpenAIP coord backfill for fields OurAirports never carried (hospital
      # heliports / small ULM strips). Runs on the WEEKLY SCHEDULE (in apply
      # mode, right after the OurAirports import, so it only fills the fields
      # OurAirports still lacks) and on a manual `backfill` dispatch (dry-run
      # unless `apply`, which also doubles as the OPENAIP_API_KEY check).
      # Idempotent + fail-soft: a field OpenAIP has no coordinates for is left
      # untouched and retried next week.
      - name: OpenAIP coord backfill -> D1
        if: ${{ github.event_name == 'schedule' || inputs.backfill }}
        env:
          API_BASE: https://aip.aero
          API_KEY: ${{ secrets.CRON_SECRET }}
          OPENAIP_API_KEY: ${{ secrets.OPENAIP_API_KEY }}
          # Apply on the weekly schedule; on a manual run honour the `apply`
          # input (dry-run by default).
          BACKFILL_APPLY: ${{ (github.event_name == 'schedule' || inputs.apply == true) && '1' || '' }}
          BACKFILL_ICAOS: ${{ inputs.icaos }}
        run: uv run python import_openaip_backfill.py
