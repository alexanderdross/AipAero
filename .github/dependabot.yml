version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Group related ecosystem bumps so the CI gate runs once instead of N
      # times in parallel; reviewers also see them together. Majors get
      # their own PR — bundling Next 15→16 with React patches is asking
      # to break the build on a sweep.
      next-and-react:
        patterns:
          - "next"
          - "next-*"
          - "@next/*"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "minor"
          - "patch"
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: uv
    directory: /crawlers
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
