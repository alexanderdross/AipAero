version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 14
    ignore:
      # @types/node major version must track the Node runtime, which is
      # pinned to Node 22 on Vercel. Bumping to @types/node@23+ would
      # type-check Node 23+ APIs that don't exist at runtime. Remove this
      # entry when the Node runtime is upgraded.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      # Group related ecosystem bumps so the CI gate runs once instead of N
      # times in parallel; reviewers also see them together. Majors get
      # their own PR — bundling Next 15→16 with React patches is asking
      # to break the build on a sweep.
      next-and-react:
        patterns:
          - "next"
          - "next-*"
          - "@next/*"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
        update-types:
          - "minor"
          - "patch"
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: uv
    directory: /crawlers
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 14

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 14
