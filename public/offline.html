<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Offline - AIP:Aero</title>
    <!-- Fully self-contained offline fallback (precached by /sw.js): inline
         styles only, the logo is precached alongside. Lists the pages already
         in the SW page cache so a pilot can still reach anything previously
         viewed. Keep the cache name in sync with PAGES_CACHE in /sw.js. -->
    <style>
      body {
        margin: 0;
        font-family: Inter, Tahoma, Verdana, sans-serif;
        background: #f0f2f2;
        color: #1a1a1a;
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
        text-align: center;
      }
      img.logo {
        height: 32px;
        width: auto;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 8px;
      }
      p {
        color: #626262;
        margin: 0 0 24px;
        max-width: 32rem;
      }
      .warn {
        background: #b45309;
        color: #fff;
        border-radius: 8px;
        padding: 8px 16px;
        font-size: 0.875rem;
        margin-bottom: 24px;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        max-width: 36rem;
        width: 100%;
      }
      li {
        margin: 4px 0;
      }
      a {
        color: #2d6a9a;
        text-decoration: none;
        word-break: break-all;
      }
      a:hover {
        text-decoration: underline;
      }
      #saved:empty + #none {
        display: block;
      }
      #none {
        display: none;
        color: #626262;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <img class="logo" src="/logo.webp" alt="AIP:Aero" />
    <h1>You are offline</h1>
    <p>
      This page is not available without a connection. Pages you viewed while
      online are listed below.
    </p>
    <div class="warn">
      &#9888; Cached content may be out of date - always verify aeronautical
      data before flight.
    </div>
    <ul id="saved"></ul>
    <p id="none">No cached pages yet.</p>
    <script>
      // Enumerate the SW page cache (name must match PAGES_CACHE in /sw.js).
      if ("caches" in window) {
        caches
          .open("pages-v1")
          .then(function (cache) {
            return cache.keys();
          })
          .then(function (keys) {
            var list = document.getElementById("saved");
            keys.forEach(function (request) {
              var url = new URL(request.url);
              var li = document.createElement("li");
              var a = document.createElement("a");
              a.href = url.pathname + url.search;
              a.textContent = decodeURIComponent(url.pathname + url.search);
              li.appendChild(a);
              list.appendChild(li);
            });
          })
          .catch(function () {
            /* fail-soft */
          });
      }
    </script>
  </body>
</html>
