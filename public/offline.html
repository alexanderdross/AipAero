<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Offline - AIP:Aero</title>
    <!-- Fully self-contained offline fallback (precached by /sw.js): inline
         styles only, the logo is precached alongside. Lists the pages already
         in the SW page cache so a pilot can still reach anything previously
         viewed. Keep the cache name in sync with PAGES_CACHE in /sw.js. -->
    <style>
      body {
        margin: 0;
        font-family: Inter, Tahoma, Verdana, sans-serif;
        background: #f0f2f2;
        color: #1a1a1a;
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
        text-align: center;
      }
      img.logo {
        height: 32px;
        width: auto;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 8px;
      }
      p {
        color: #626262;
        margin: 0 0 24px;
        max-width: 32rem;
      }
      .warn {
        background: #b45309;
        color: #fff;
        border-radius: 8px;
        padding: 8px 16px;
        font-size: 0.875rem;
        margin-bottom: 24px;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        max-width: 36rem;
        width: 100%;
      }
      li {
        margin: 4px 0;
      }
      a {
        color: #2d6a9a;
        text-decoration: none;
        word-break: break-all;
      }
      a:hover {
        text-decoration: underline;
      }
      #saved:empty + #none {
        display: block;
      }
      #none {
        display: none;
        color: #626262;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <img class="logo" src="/logo.webp" alt="AIP:Aero" />
    <h1 id="t-title">You are offline</h1>
    <p id="t-desc">
      This page is not available without a connection. Pages you viewed while
      online are listed below.
    </p>
    <div class="warn" id="t-warn">
      &#9888; Cached content may be out of date - always verify aeronautical
      data before flight.
    </div>
    <ul id="saved"></ul>
    <p id="none">No cached pages yet.</p>
    <script>
      // Localize the static English defaults from the browser language (all
      // languages of the supported locales; en stays the no-JS fallback).
      // Fixed vocabulary in code, like the SW banner - no i18n files offline.
      (function () {
        var I18N = {
          de: {
            title: "Du bist offline",
            desc: "Diese Seite ist ohne Verbindung nicht verfügbar. Zuvor besuchte Seiten sind unten aufgelistet.",
            warn: "⚠ Gespeicherte Inhalte sind möglicherweise veraltet - Luftfahrtdaten vor dem Flug immer verifizieren.",
            none: "Noch keine gespeicherten Seiten.",
          },
          fr: {
            title: "Vous êtes hors ligne",
            desc: "Cette page n'est pas disponible sans connexion. Les pages consultées en ligne sont listées ci-dessous.",
            warn: "⚠ Le contenu en cache peut être obsolète - vérifiez toujours les données aéronautiques avant le vol.",
            none: "Aucune page en cache pour le moment.",
          },
          nl: {
            title: "Je bent offline",
            desc: "Deze pagina is niet beschikbaar zonder verbinding. Eerder bezochte pagina's staan hieronder.",
            warn: "⚠ Gecachte inhoud kan verouderd zijn - controleer luchtvaartgegevens altijd vóór de vlucht.",
            none: "Nog geen opgeslagen pagina's.",
          },
          cs: {
            title: "Jste offline",
            desc: "Tato stránka není bez připojení dostupná. Dříve navštívené stránky jsou uvedeny níže.",
            warn: "⚠ Uložený obsah může být zastaralý - letecká data před letem vždy ověřte.",
            none: "Zatím žádné uložené stránky.",
          },
          da: {
            title: "Du er offline",
            desc: "Denne side er ikke tilgængelig uden forbindelse. Tidligere besøgte sider er vist nedenfor.",
            warn: "⚠ Gemt indhold kan være forældet - verificér altid luftfartsdata før flyvning.",
            none: "Ingen gemte sider endnu.",
          },
          el: {
            title: "Είστε εκτός σύνδεσης",
            desc: "Αυτή η σελίδα δεν είναι διαθέσιμη χωρίς σύνδεση. Οι σελίδες που επισκεφθήκατε εμφανίζονται παρακάτω.",
            warn: "⚠ Το αποθηκευμένο περιεχόμενο ενδέχεται να είναι παρωχημένο - επαληθεύετε πάντα τα αεροναυτικά δεδομένα πριν από την πτήση.",
            none: "Δεν υπάρχουν αποθηκευμένες σελίδες ακόμα.",
          },
          nb: {
            title: "Du er frakoblet",
            desc: "Denne siden er ikke tilgjengelig uten tilkobling. Tidligere besøkte sider er listet nedenfor.",
            warn: "⚠ Lagret innhold kan være utdatert - verifiser alltid luftfartsdata før flyging.",
            none: "Ingen lagrede sider ennå.",
          },
          pl: {
            title: "Jesteś offline",
            desc: "Ta strona nie jest dostępna bez połączenia. Wcześniej odwiedzone strony są wymienione poniżej.",
            warn: "⚠ Zapisane treści mogą być nieaktualne - zawsze weryfikuj dane lotnicze przed lotem.",
            none: "Brak zapisanych stron.",
          },
          sv: {
            title: "Du är offline",
            desc: "Den här sidan är inte tillgänglig utan anslutning. Tidigare besökta sidor listas nedan.",
            warn: "⚠ Sparat innehåll kan vara föråldrat - verifiera alltid flygdata före flygning.",
            none: "Inga sparade sidor ännu.",
          },
        };
        var langs = navigator.languages || [navigator.language || "en"];
        for (var i = 0; i < langs.length; i++) {
          var code = String(langs[i]).slice(0, 2).toLowerCase();
          if (code === "no" || code === "nn") code = "nb";
          var t = I18N[code];
          if (code === "en") break;
          if (t) {
            document.documentElement.lang = code;
            document.title = t.title + " - AIP:Aero";
            document.getElementById("t-title").textContent = t.title;
            document.getElementById("t-desc").textContent = t.desc;
            document.getElementById("t-warn").textContent = t.warn;
            document.getElementById("none").textContent = t.none;
            break;
          }
        }
      })();
    </script>
    <script>
      // List the downloaded country packs and the explicitly saved fields
      // first (titles from the localStorage indexes), then everything in the
      // browsing cache. Cache names must match /sw.js (SAVED_CACHE /
      // PAGES_CACHE); the index keys must match save-offline-button.tsx
      // ("aip-offline-saved") and save-country-offline-button.tsx
      // ("aip-offline-bulk").
      (function () {
        if (!("caches" in window)) return;
        var list = document.getElementById("saved");
        var seen = {};

        function addLink(href, label, strong) {
          if (seen[href]) return;
          seen[href] = true;
          var li = document.createElement("li");
          var a = document.createElement("a");
          a.href = href;
          a.textContent = label;
          if (strong) a.style.fontWeight = "600";
          li.appendChild(a);
          list.appendChild(li);
        }

        try {
          // Country packs (Phase 4): link the pack's airport-list page - it is
          // itself in the bulk cache and indexes every downloaded detail page.
          var bulk = JSON.parse(localStorage.getItem("aip-offline-bulk") || "{}");
          Object.keys(bulk).forEach(function (loc) {
            var pack = bulk[loc];
            if (pack && pack.url) {
              addLink(
                pack.url,
                (pack.title || pack.url) + " (" + (pack.count || "?") + ")",
                true,
              );
            }
          });
        } catch (e) {
          /* fail-soft */
        }

        try {
          var index = JSON.parse(
            localStorage.getItem("aip-offline-saved") || "[]",
          );
          index.forEach(function (entry) {
            if (entry && entry.url) {
              addLink(entry.url, entry.title || entry.url, true);
            }
          });
        } catch (e) {
          /* fail-soft */
        }

        caches
          .open("pages-v1")
          .then(function (cache) {
            return cache.keys();
          })
          .then(function (keys) {
            keys.forEach(function (request) {
              var url = new URL(request.url);
              var href = url.pathname + url.search;
              addLink(href, decodeURIComponent(href), false);
            });
          })
          .catch(function () {
            /* fail-soft */
          });
      })();
    </script>
  </body>
</html>
